<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #000000 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            user-select: none;
        }

        #stage2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s;
        }

        .instruction {
            margin-top: 10vh;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: pulseText 2s infinite;
        }

        #lighter {
            position: absolute;
            top: 65%; left: 30%;
            width: 40px; height: 75px;
            background: linear-gradient(135deg, #e0e0e0 0%, #9e9e9e 50%, #616161 100%);
            border-radius: 8px;
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.6);
            cursor: grab;
            z-index: 25;
            transition: transform 0.1s;
        }
        #lighter:active { cursor: grabbing; transform: scale(0.95); }
        
        #lighter::before {
            content: ''; position: absolute;
            top: -15px; left: 0;
            width: 40px; height: 15px;
            background: linear-gradient(135deg, #bdbdbd 0%, #757575 100%);
            border-radius: 8px 8px 0 0;
            transform-origin: bottom left;
            transform: rotate(-45deg);
        }

        .flame {
            position: absolute;
            top: -35px; left: 10px;
            width: 20px; height: 35px;
            background: radial-gradient(circle at 50% 100%, #fff 0%, #ffeb3b 30%, #ff5722 70%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff5722, 0 0 40px #ffeb3b;
            animation: flicker 0.1s infinite alternate;
            pointer-events: none;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.1) rotate(2deg); opacity: 1; }
        }

        #firework-prop {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 30px; height: 100px;
            background: linear-gradient(to right, #b71c1c, #d32f2f, #b71c1c);
            border-radius: 3px 3px 0 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        #firework-prop::before {
            content: ''; position: absolute;
            top: -25px; left: -5px;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 25px solid #ff5252;
        }

        #fuse {
            position: absolute;
            bottom: 120px; left: 50%;
            width: 4px; height: 80px;
            background: #795548;
            border-radius: 2px;
            box-shadow: inset 1px 0 2px rgba(0,0,0,0.5);
        }

        canvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .message {
            display: none;
            position: absolute;
            left: 50%;
            z-index: 10;
            width: 90%;
            line-height: 1.6;
        }

        #msg1 {
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        /* Final Yazısı (#İSSAB) - Romantik font */
        #msg2 {
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive;
            font-weight: 700;
            font-size: 12vw;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.9), 0 0 60px rgba(255, 20, 147, 0.7), 0 0 100px #ff1493;
            opacity: 0;
            display: none;
            white-space: nowrap;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (min-width: 768px) {
            #msg1 { font-size: 2.5rem; width: 70%; }
            #msg2 { font-size: 8rem; }
        }
    </style>
</head>
<body>

    <div id="stage2">
        <div class="instruction">Ateşlemek için alevi fitile sürükle</div>
        <div id="fuse"></div>
        <div id="firework-prop"></div>
        
        <div id="lighter" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
            <div class="flame" id="flame"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="msg1" class="message">
        seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum
    </div>
    
    <div id="msg2" class="message">
        #İSSAB
    </div>

<script>
    // --- ÇAKMAK KONTROLLERİ ---
    const lighter = document.getElementById('lighter');
    const fuse = document.getElementById('fuse');
    let isDragging = false;

    function startDrag(e) { isDragging = true; }

    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    function drag(e) {
        if (!isDragging) return;
        if(e.type === 'touchmove') e.preventDefault(); 
        
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);
        
        lighter.style.left = (x - 20) + 'px';
        lighter.style.top = (y - 35) + 'px';

        let fuseRect = fuse.getBoundingClientRect();
        let flameRect = document.getElementById('flame').getBoundingClientRect();
        
        if (flameRect.right > fuseRect.left && flameRect.left < fuseRect.right &&
            flameRect.bottom > fuseRect.top && flameRect.top < fuseRect.bottom) {
            isDragging = false;
            ignite();
        }
    }

    function stopDrag() { isDragging = false; }

    // --- HAVAİ FİŞEK MOTORU ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let rocketInterval;
    let textFadeInterval = null;
    let stars = [];
    let time = 0;

    function ignite() {
        document.getElementById('stage2').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('stage2').style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            startFireworksScenario();
        }, 500);
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Yıldızları yeniden oluştur
        generateStars();
    }

    // --- YILDIZLAR ve AY ---
    function generateStars() {
        stars = [];
        const count = 180;
        for (let i = 0; i < count; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.85, // yukarıda kalsın
                radius: Math.random() * 2.2 + 0.8,
                baseOpacity: Math.random() * 0.7 + 0.3,
                speed: Math.random() * 0.02 + 0.01,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    function drawNightSky() {
        // 1. Gece göğü gradienti
        const grad = ctx.createRadialGradient(
            canvas.width * 0.8, canvas.height * 0.1, 100,
            canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.8
        );
        grad.addColorStop(0, '#1a2a4a');
        grad.addColorStop(0.5, '#0f1a2f');
        grad.addColorStop(1, '#05080f');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Yıldızlar (parıldama efekti)
        time += 0.01;
        for (let star of stars) {
            const opacity = star.baseOpacity * (0.7 + 0.3 * Math.sin(time * star.speed + star.phase));
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 240, ${opacity})`;
            ctx.shadowColor = 'rgba(255,255,220,0.3)';
            ctx.shadowBlur = 8;
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        // 3. Ay (sağ üstte, büyük ve parlak)
        const moonX = canvas.width * 0.78;
        const moonY = canvas.height * 0.12;
        const moonRadius = Math.min(canvas.width, canvas.height) * 0.09;

        // Işık halesi
        const glow = ctx.createRadialGradient(moonX, moonY, moonRadius * 0.2, moonX, moonY, moonRadius * 2.5);
        glow.addColorStop(0, 'rgba(255, 250, 210, 0.8)');
        glow.addColorStop(0.3, 'rgba(255, 240, 180, 0.3)');
        glow.addColorStop(1, 'rgba(255, 240, 180, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(moonX, moonY, moonRadius * 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Ay gövdesi (dolunay)
        ctx.shadowColor = 'rgba(255, 250, 200, 0.6)';
        ctx.shadowBlur = 40;
        ctx.beginPath();
        ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
        const moonGrad = ctx.createRadialGradient(
            moonX - moonRadius * 0.3, moonY - moonRadius * 0.3, moonRadius * 0.1,
            moonX, moonY, moonRadius
        );
        moonGrad.addColorStop(0, '#fffde8');
        moonGrad.addColorStop(0.7, '#f5e6b0');
        moonGrad.addColorStop(1, '#d4b87a');
        ctx.fillStyle = moonGrad;
        ctx.fill();

        // Ay yüzeyindeki hafif kraterler (ince detay)
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(200, 180, 140, 0.15)';
        ctx.beginPath();
        ctx.arc(moonX - moonRadius * 0.25, moonY - moonRadius * 0.2, moonRadius * 0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(moonX + moonRadius * 0.3, moonY + moonRadius * 0.1, moonRadius * 0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(moonX - moonRadius * 0.1, moonY + moonRadius * 0.3, moonRadius * 0.08, 0, Math.PI * 2);
        ctx.fill();

        // Ayın parlak ışıması
        ctx.shadowBlur = 0;
        const innerGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonRadius * 0.9);
        innerGlow.addColorStop(0, 'rgba(255,255,255,0.2)');
        innerGlow.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = innerGlow;
        ctx.beginPath();
        ctx.arc(moonX, moonY, moonRadius * 0.9, 0, Math.PI * 2);
        ctx.fill();
    }

    // --- PARÇACIK SINIFI (değişmedi) ---
    class Particle {
        constructor(x, y, vx, vy, color, type) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.color = color;
            this.type = type;
            this.alpha = 1;
            
            if (type === 'big_spark') {
                this.decay = Math.random() * 0.003 + 0.004;
                this.size = Math.random() * 5 + 3.5;
            } else if (type === 'text_spark') {
                this.decay = Math.random() * 0.005 + 0.006;
                this.size = Math.random() * 4 + 2;
            } else {
                this.decay = Math.random() * 0.012 + 0.012;
                this.size = type === 'rocket' || type === 'big_rocket' ? 4 : (Math.random() * 3.5 + 2.5);
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            if (this.type === 'spark' || this.type === 'text_spark') {
                this.vx *= 0.93;
                this.vy *= 0.93;
                this.vy += 0.04;
                this.alpha -= this.decay;
            } else if (this.type === 'big_spark') {
                this.vx *= 0.96;
                this.vy *= 0.96;
                this.vy += 0.012;
                this.alpha -= this.decay;
            } else {
                this.vy += 0.15;
            }
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.globalCompositeOperation = 'lighter'; 
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // --- PATLAMA FONKSİYONLARI (değişmedi) ---
    function explodeShape(startX, startY, shapeType, isBig = false) {
        const colors = ['#ff2a5f', '#ff7eb3', '#ff0055', '#ff99aa', '#fff'];
        
        const particleCount = isBig ? 650 : 180; 
        const scale = isBig ? 26 : 7.5; 
        const sparkType = isBig ? 'big_spark' : 'spark';

        for (let i = 0; i < particleCount; i++) {
            let t = Math.random() * Math.PI * 2;
            let vx, vy;

            if (shapeType === 0) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                vx = x * (scale / 10);
                vy = y * (scale / 10);
            } else if (shapeType === 1) {
                let r = Math.sin(5 * t) * 12;
                vx = r * Math.cos(t) * (scale / 6);
                vy = -r * Math.sin(t) * (scale / 6);
            } else {
                let speed = Math.random() * scale;
                vx = Math.cos(t) * speed;
                vy = Math.sin(t) * speed;
            }

            vx += (Math.random() - 0.5) * (isBig ? 4 : 0.8);
            vy += (Math.random() - 0.5) * (isBig ? 4 : 0.8);

            let color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new Particle(startX, startY, vx, vy, color, sparkType));
        }

        if (isBig) {
            // Flaş efekti
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const msg2 = document.getElementById('msg2');
            msg2.style.display = 'block';
            msg2.style.opacity = '1';
            
            startTextFirework();
        }
    }

    // --- YAZI KAYBOLMA KIVILCIMLARI (değişmedi) ---
    function startTextFirework() {
        const msg2 = document.getElementById('msg2');
        if (!msg2) return;
        
        if (textFadeInterval) clearInterval(textFadeInterval);
        
        let opacity = 1.0;
        const fadeStep = 0.006;
        const intervalMs = 50;
        
        textFadeInterval = setInterval(() => {
            const rect = msg2.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            
            const sparkCount = Math.floor(Math.random() * 5) + 8;
            const colors = ['#ffb6c1', '#ff69b4', '#ff1493', '#ffa500', '#ffd700', '#fff'];
            
            for (let i = 0; i < sparkCount; i++) {
                const angle = Math.random() * 2 * Math.PI;
                const speed = Math.random() * 6 + 2;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - 1;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const offX = (Math.random() - 0.5) * rect.width * 0.8;
                const offY = (Math.random() - 0.5) * rect.height * 0.8;
                const p = new Particle(
                    cx + offX,
                    cy + offY,
                    vx, vy,
                    color,
                    'text_spark'
                );
                particles.push(p);
            }
            
            opacity = Math.max(0, opacity - fadeStep);
            msg2.style.opacity = opacity;
            
            if (opacity <= 0) {
                clearInterval(textFadeInterval);
                textFadeInterval = null;
                msg2.style.display = 'none';
                msg2.style.opacity = '0';
            }
        }, intervalMs);
        
        setTimeout(() => {
            if (textFadeInterval) {
                clearInterval(textFadeInterval);
                textFadeInterval = null;
                msg2.style.display = 'none';
                msg2.style.opacity = '0';
            }
        }, 5000);
    }

    // --- ROKET FIRLATMA ---
    function launchRocket() {
        const x = Math.random() * (canvas.width * 0.7) + (canvas.width * 0.15);
        const vy = -(Math.random() * 4 + 11);
        particles.push(new Particle(x, canvas.height, 0, vy, '#fff', 'rocket'));
    }

    function launchBigRocket() {
        particles.push(new Particle(canvas.width / 2, canvas.height, 0, -17, '#ff0055', 'big_rocket'));
    }

    // --- ANİMASYON DÖNGÜSÜ (GÜNCELLENDİ) ---
    function animate() {
        // 1. Arka planı temizle ve gece gökyüzünü çiz
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawNightSky();

        // 2. Tüm parçacıkları çiz
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw();

            // Roketler patlama noktasına geldiğinde
            if (p.type === 'rocket' && p.vy >= -0.5) {
                let shape = Math.random() > 0.5 ? 0 : 1; 
                explodeShape(p.x, p.y, shape, false);
                particles.splice(i, 1);
                continue;
            } else if (p.type === 'big_rocket' && p.vy >= -0.5) {
                explodeShape(p.x, p.y, 2, true);
                particles.splice(i, 1);
                continue;
            }

            // Ömrü bitenleri temizle
            if (p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    // --- SENARYO ZAMANLAMALARI (değişmedi) ---
    function startFireworksScenario() {
        animate();
        rocketInterval = setInterval(launchRocket, 900);
        launchRocket(); 
        
        setTimeout(() => {
            let msg1 = document.getElementById('msg1');
            msg1.style.display = 'block';
            setTimeout(() => { msg1.style.opacity = '1'; }, 50);
        }, 4000);

        setTimeout(() => {
            let msg1 = document.getElementById('msg1');
            msg1.style.opacity = '0';
            clearInterval(rocketInterval);
            
            setTimeout(() => { msg1.style.display = 'none'; }, 2000);
            
            setTimeout(launchBigRocket, 1500);
        }, 12000);
    }

    // Başlangıçta yıldızları oluştur
    generateStars();
</script>
</body>
</html>
