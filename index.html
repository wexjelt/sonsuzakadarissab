<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; text-align: center; user-select: none; }

        #stage2 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: flex; flex-direction: column; align-items: center; transition: opacity 0.5s; }
        .instruction { margin-top: 10vh; font-size: 1.2rem; color: #fff; animation: pulseText 2s infinite; }

        #lighter { position: absolute; top: 65%; left: 30%; width: 40px; height: 75px; background: linear-gradient(135deg, #e0e0e0, #616161); border-radius: 8px; cursor: grab; z-index: 25; }
        .flame { position: absolute; top: -35px; left: 10px; width: 20px; height: 35px; background: radial-gradient(circle at 50% 100%, #fff, #ff5722, transparent); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 20px #ff5722; animation: flicker 0.1s infinite alternate; }

        @keyframes flicker { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(1.1); opacity: 1; } }
        #fuse { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 4px; height: 80px; background: #795548; }
        #firework-prop { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 30px; height: 100px; background: linear-gradient(to right, #b71c1c, #d32f2f); }

        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        .message { display: none; position: absolute; z-index: 10; pointer-events: none; }

        #msg1 { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.8rem; color: #fff; opacity: 0; transition: opacity 2s; }

        #msg2 {
            font-size: 10rem; font-weight: 800; color: #fff;
            text-shadow: 0 0 30px #ff0055, 0 0 60px #ff0055;
            animation: emerge 3s cubic-bezier(0.1, 0.5, 0.3, 1) forwards;
        }

        @keyframes emerge {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="stage2">
        <div class="instruction">Ateşlemek için alevi fitile sürükle</div>
        <div id="fuse"></div>
        <div id="firework-prop"></div>
        <div id="lighter" onmousedown="startDrag(event)" ontouchstart="startDrag(event)"><div class="flame"></div></div>
    </div>

    <canvas id="canvas"></canvas>
    <div id="msg1" class="message">seni tüm yıldızlardan daha çok seviyorum</div>
    <div id="msg2" class="message">#İSSAB</div>

<script>
    const lighter = document.getElementById('lighter'), fuse = document.getElementById('fuse'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    let isDragging = false, particles = [];

    // Renk Grupları
    const palettes = [
        ['#ff0055', '#ffcc00', '#ffffff'], ['#00f0ff', '#ffffff', '#7000ff'],
        ['#00ff87', '#00bcff', '#ffffff'], ['#ff85e3', '#9b5de5', '#ffffff'],
        ['#ffb703', '#fb8500', '#ffffff']
    ];

    function startDrag(e) { isDragging = true; }
    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag, {passive: false});
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('touchend', () => isDragging = false);

    function drag(e) {
        if (!isDragging) return;
        let x = e.clientX || e.touches[0].clientX;
        let y = e.clientY || e.touches[0].clientY;
        lighter.style.left = (x - 20) + 'px'; lighter.style.top = (y - 35) + 'px';
        let f = fuse.getBoundingClientRect(), l = lighter.getBoundingClientRect();
        if (l.right > f.left && l.left < f.right && l.bottom > f.top && l.top < f.bottom) {
            isDragging = false; ignite();
        }
    }

    function ignite() {
        document.getElementById('stage2').style.opacity = '0';
        setTimeout(() => { document.getElementById('stage2').style.display = 'none'; canvas.style.display = 'block'; canvas.width = window.innerWidth; canvas.height = window.innerHeight; animate(); }, 500);
        setInterval(launch, 800);
    }

    class Particle {
        constructor(x, y, vx, vy, color, isFinal) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.alpha = 1; this.isFinal = isFinal;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.alpha -= 0.01; }
        draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill(); }
    }

    function launch() {
        let x = Math.random() * canvas.width, y = canvas.height;
        let color = palettes[Math.floor(Math.random() * palettes.length)][0];
        particles.push({x, y, vy: -12, color, type: 'rocket'});
    }

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0, canvas.width, canvas.height);
        for(let i = particles.length-1; i >= 0; i--) {
            let p = particles[i];
            if(p.type === 'rocket') {
                p.y += p.vy; p.vy += 0.1;
                if(p.vy >= 0) {
                    let palette = palettes[Math.floor(Math.random() * palettes.length)];
                    for(let j=0; j<100; j++) {
                        let ang = Math.random() * Math.PI * 2;
                        particles.push(new Particle(p.x, p.y, Math.cos(ang)*5, Math.sin(ang)*5, palette[Math.floor(Math.random()*palette.length)]));
                    }
                    particles.splice(i, 1);
                }
            } else { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1); }
        }
        requestAnimationFrame(animate);
    }

    // Final Zamanlaması
    setTimeout(() => { document.getElementById('msg1').style.opacity = 1; }, 3000);
    setTimeout(() => {
        document.getElementById('msg1').style.display = 'none';
        // Son Patlama ve Yazı
        let msg2 = document.getElementById('msg2');
        msg2.style.left = '50%'; msg2.style.top = '50%';
        msg2.style.display = 'block';
    }, 10000);
</script>
</body>
</html>
