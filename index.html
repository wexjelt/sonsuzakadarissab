<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musab'ı Yakala! (Mobil)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none; /* Kaydırmayı engelle */
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #3e2723;
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Mobil ekran boyutlarına göre ayarla
        canvas.width = 360; 
        canvas.height = 640;

        let gameState = "START";
        const laneWidth = canvas.width / 3;
        let player = { lane: 1, x: laneWidth, y: 500, size: 40 };
        let musab = { lane: 1, x: laneWidth, y: 100, size: 40, speed: 2 };
        
        let distanceTraveled = 0;
        let obstacles = [];
        let items = [];

        // Dokunmatik Kontroller (Ekranın yarısına dokunma)
        window.addEventListener("touchstart", (e) => {
            if (gameState !== "PLAYING") {
                resetGame();
                gameState = "PLAYING";
                return;
            }
            
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) {
                if (player.lane > 0) player.lane--; // Sola git
            } else {
                if (player.lane < 2) player.lane++; // Sağa git
            }
        });

        function resetGame() {
            player.lane = 1;
            musab.lane = 1;
            musab.y = 100;
            distanceTraveled = 0;
            obstacles = [];
            items = [];
        }

        function drawPixelCharacter(x, y, color, isMusab) {
            ctx.fillStyle = color;
            ctx.fillRect(x + 5, y + 8, 30, 20); // Gövde
            ctx.fillStyle = "#ffcc99";
            ctx.fillRect(x + 10, y, 20, 10); // Kafa
        }

        function update() {
            if (gameState !== "PLAYING") return;
            distanceTraveled += 0.5;

            // Musab'ı yavaşça aşağıya (oyuncuya doğru) yaklaştır
            musab.y += 0.5;
            
            // Rastgele şerit değiştirme
            if (Math.random() < 0.02) musab.lane = Math.floor(Math.random() * 3);

            // Engel üretimi
            if (Math.random() < 0.03) {
                obstacles.push({ lane: Math.floor(Math.random() * 3), y: -50 });
            }

            // Engelleri hareket ettir
            obstacles.forEach((obs, i) => {
                obs.y += 4;
                if (obs.y > canvas.height) obstacles.splice(i, 1);
                
                // Çarpışma
                if (obs.y > 450 && obs.y < 550 && player.lane === obs.lane) {
                    gameState = "GAMEOVER";
                }
            });

            // Kazanma/Kaybetme
            if (musab.y > canvas.height) gameState = "GAMEOVER";
            if (musab.y > 450 && musab.y < 550 && player.lane === musab.lane) gameState = "WIN";
        }

        function draw() {
            ctx.fillStyle = "#3e2723";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Şeritler
            ctx.strokeStyle = "#5d4037";
            ctx.beginPath();
            ctx.moveTo(laneWidth, 0); ctx.lineTo(laneWidth, canvas.height);
            ctx.moveTo(laneWidth * 2, 0); ctx.lineTo(laneWidth * 2, canvas.height);
            ctx.stroke();

            // Çizimler
            drawPixelCharacter(player.lane * laneWidth + (laneWidth/2 - 20), 500, "#4caf50", false);
            drawPixelCharacter(musab.lane * laneWidth + (laneWidth/2 - 20), musab.y, "#2196f3", true);

            obstacles.forEach(obs => {
                ctx.fillStyle = "#a1887f";
                ctx.fillRect(obs.lane * laneWidth + 20, obs.y, 40, 40);
            });

            if (gameState !== "PLAYING") {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "14px 'Press Start 2P'";
                ctx.textAlign = "center";
                ctx.fillText(gameState === "START" ? "DOKUN VE BAŞLA" : gameState, canvas.width/2, canvas.height/2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
