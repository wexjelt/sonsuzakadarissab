<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sonsuz Bir Hikaye...</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; 
        }
        body, html {
            background-color: #050505;
            overflow: hidden;
            width: 100%;
            height: 100dvh;
            position: relative;
            overscroll-behavior: none;
            font-family: 'Press Start 2P', monospace;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        
        /* --- SORU EKRANI MODALI --- */
        #quiz-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.8s ease;
            touch-action: auto;
        }
        .quiz-box {
            background: #111;
            border: 4px solid #ff007f;
            box-shadow: 0 0 20px rgba(255,0,127,0.4), inset -6px -6px 0 #080808;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            image-rendering: pixelated;
        }
        .quiz-title {
            color: #fff;
            font-size: 11px;
            line-height: 1.8;
            margin-bottom: 25px;
            text-shadow: 0 0 5px #ff00ff;
        }
        .quiz-input {
            width: 100%;
            background: #000;
            border: 4px solid #333;
            color: #00ffcc;
            padding: 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.8);
            -webkit-user-select: text;
            user-select: text;
        }
        .quiz-input:focus {
            border-color: #00ffcc;
        }
        .quiz-btn {
            background: #000;
            color: #ff007f;
            border: 4px solid #ff007f;
            padding: 12px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #4a0025;
            width: 100%;
        }
        .quiz-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #4a0025;
        }
        .error-msg {
            color: #ff3333;
            font-size: 8px;
            margin-top: 15px;
            min-height: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- OYUN ALANI --- */
        #ui-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: calc(30px + env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom)) 20px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .instruction {
            font-size: 9px;
            color: #fff;
            text-align: center;
            line-height: 1.8;
            text-transform: uppercase;
            text-shadow: 0 0 5px #ff007f, 0 0 10px #ff007f;
            animation: neonPulse 1.5s infinite alternate;
            pointer-events: none;
        }
        @keyframes neonPulse {
            from { opacity: 0.6; text-shadow: 0 0 5px #ff007f; }
            to { opacity: 1; text-shadow: 0 0 10px #ff007f, 0 0 20px #ff00ff; }
        }
        #stage {
            position: relative;
            width: 100%;
            flex-grow: 1;
        }
        #firework-box {
            position: absolute;
            bottom: 25%; left: 50%;
            transform: translateX(-50%);
            width: 76px; height: 96px;
            background: #141414;
            border: 4px solid #282828;
            box-shadow: inset -8px -8px 0 #0a0a0a, 0 0 15px rgba(255,0,127,0.15);
            image-rendering: pixelated;
        }
        #firework-box::after {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            background: repeating-linear-gradient(45deg, #5c0016, #5c0016 8px, #0f0f0f 8px, #0f0f0f 16px);
        }
        #fuse {
            position: absolute;
            top: -28px; left: 50%;
            width: 8px; height: 28px;
            background: #333;
            transform: translateX(-50%);
            image-rendering: pixelated;
        }
        #fuse::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to bottom, #555 50%, transparent 50%);
            background-size: 100% 8px;
        }
        #fuse.burning::before {
            background-image: linear-gradient(to bottom, #ff3300 50%, #ffcc00 50%);
            animation: fuseBurn 1.5s linear forwards;
        }
        @keyframes fuseBurn {
            0% { height: 100%; }
            100% { height: 0%; }
        }
        #lighter {
            position: absolute;
            bottom: 8%; left: 50%;
            transform: translateX(-50%);
            width: 48px; height: 72px;
            background: #1c1c1c;
            border: 4px solid #3a3a3a;
            box-shadow: inset -6px -6px 0 #0a0a0a;
            z-index: 100;
        }
        #lighter-top {
            position: absolute;
            top: -16px; left: 5px;
            width: 30px; height: 16px;
            background: #555;
            border: 4px solid #777;
            border-bottom: none;
        }
        #flame {
            position: absolute;
            top: -24px; left: 9px;
            width: 12px; height: 24px;
            background: #ff3300;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 10px #ff3300;
            opacity: 0;
            transform: scale(0);
            transition: transform 0.2s;
        }
        #lighter.ignited #flame {
            opacity: 1;
            transform: scale(1);
            animation: pixelFlicker 0.1s infinite alternate;
        }
        @keyframes pixelFlicker {
            0% { transform: scale(1) translate(1px, 0); background: #ff3300; }
            100% { transform: scale(1.1) translate(-1px, -1px); background: #ffcc00; }
        }
        
        /* --- YAZI OVERLAY KATMANI --- */
        #text-overlay {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }
        .love-message {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #ffffff;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255, 0, 98, 0.6), 0 0 30px rgba(255, 0, 98, 0.4);
            transition: opacity 2s ease, transform 2s ease;
            transform: translate(-50%, -50%) scale(0.9);
            position: absolute;
            left: 50%; width: 100%;
        }
        .love-message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.05);
        }
        #replay-btn {
            position: absolute;
            bottom: 8%; left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 10px;
            padding: 12px 20px;
            background: #000;
            color: #00ffcc;
            border: 4px solid #00ffcc;
            box-shadow: 4px 4px 0 #005544;
            cursor: pointer;
            z-index: 105;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <div id="quiz-overlay">
        <div class="quiz-box">
            <div class="quiz-title" id="quiz-question">Beraber gitmek istediğimiz ülke?<br>(İpucu: Baş harfi sen)</div>
            <input type="text" class="quiz-input" id="quiz-answer" placeholder="Cevabı yaz..." autocomplete="off">
            <button class="quiz-btn" id="quiz-submit-btn">GİRİŞ YAP</button>
            <div class="error-msg" id="quiz-error">Yanlış cevap, tekrar dene sevgilim... ❤️</div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="ui-container">
        <div class="instruction" id="info-text">Çakmağa Dokun ve Yak!<br>Sonra Sürükleyip Fitili Ateşle.</div>
        <div id="stage">
            <div id="firework-box"><div id="fuse"></div></div>
            <div id="lighter"><div id="flame"></div><div id="lighter-top"></div></div>
        </div>
    </div>

    <div id="text-overlay">
        <div class="love-message" id="msg">Seni göğe baktığında gördüğün ay ve yıldızlar kadar seviyorum...</div>
    </div>

    <button id="replay-btn">TEKRAR OYNAT</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const lighter = document.getElementById('lighter');
        const fuse = document.getElementById('fuse');
        const uiContainer = document.getElementById('ui-container');
        const infoText = document.getElementById('info-text');
        const msg = document.getElementById('msg');
        const replayBtn = document.getElementById('replay-btn');
        const quizOverlay = document.getElementById('quiz-overlay');
        const quizAnswer = document.getElementById('quiz-answer');
        const quizSubmitBtn = document.getElementById('quiz-submit-btn');
        const quizError = document.getElementById('quiz-error');

        let isIgnited = false;
        let isDragging = false;
        let particles = [];
        let rockets = [];
        let animationFrame;
        let timeline = 0;
        let showActive = false;
        let finalRocketLaunched = false;

        // #ISSAB Kelime Haritası Matrisi (Piksel Sanatı Tasarımı)
        const textGrid = {
            '#': [[0,2],[1,2],[2,0],[2,1],[2,2],[2,3],[2,4],[3,2],[4,0],[4,1],[4,2],[4,3],[4,4],[5,2],[6,2]],
            'İ': [[0,2],[2,2],[3,2],[4,2],[5,2],[6,2]],
            'S': [[0,1],[0,2],[0,3],[1,0],[2,0],[3,1],[3,2],[4,3],[5,3],[6,0],[6,1],[6,2]],
            'A': [[0,2],[1,1],[1,3],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3],[3,4],[4,0],[4,4],[5,0],[5,4],[6,0],[6,4]],
            'B': [[0,0],[0,1],[0,2],[0,3],[1,0],[1,4],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3],[4,0],[4,4],[5,0],[5,4],[6,0],[6,1],[6,2],[6,3]]
        };
        const wordSequence = ["#", "İ", "S", "S", "A", "B"];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // Garantili ve basit kelime temizleme filtresi
        function temizle(metin) {
            if (!metin) return "";
            return metin
                .trim()
                .toLowerCase()
                .replace(/ı/g, 'i')
                .replace(/ğ/g, 'g')
                .replace(/ü/g, 'u')
                .replace(/ş/g, 's')
                .replace(/ö/g, 'o')
                .replace(/ç/g, 'c');
        }

        function checkAnswer() {
            const girdi = temizle(quizAnswer.value);
            
            // "isvicre" veya "İsviçre" yazıldığında doğrudan kabul edilir
            if(girdi === "isvicre" || girdi === "isviçre") {
                quizOverlay.style.opacity = '0';
                setTimeout(() => {
                    quizOverlay.style.display = 'none';
                    uiContainer.style.display = 'flex';
                    setTimeout(() => uiContainer.style.opacity = '1', 50);
                }, 800);
            } else {
                quizError.style.opacity = '1';
                quizAnswer.value = "";
                setTimeout(() => { quizError.style.opacity = '0'; }, 3000);
            }
        }
        
        quizSubmitBtn.addEventListener('click', checkAnswer);
        quizAnswer.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });

        let startX = 0, startY = 0;

        function onTouchStart(e) {
            if (e.target === lighter || lighter.contains(e.target)) { e.preventDefault(); }
            if (!isIgnited) {
                isIgnited = true;
                lighter.classList.add('ignited');
                infoText.innerHTML = "Harika! Şimdi Sürükle<br>ve Üstteki Fitili Yak.";
                const rect = lighter.getBoundingClientRect();
                lighter.style.transform = 'none';
                lighter.style.left = rect.left + 'px';
                lighter.style.top = rect.top + 'px';
            }
            isDragging = true;
            const touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX - lighter.offsetLeft;
            startY = touch.clientY - lighter.offsetTop;
        }

        function onTouchMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            let currentX = touch.clientX - startX;
            let currentY = touch.clientY - startY;
            if(currentX < 0) currentX = 0;
            if(currentX > window.innerWidth - 48) currentX = window.innerWidth - 48;
            lighter.style.left = currentX + 'px';
            lighter.style.top = currentY + 'px';

            const fRect = fuse.getBoundingClientRect();
            const flameRect = document.getElementById('flame').getBoundingClientRect();
            if (flameRect.left < fRect.right && flameRect.right > fRect.left &&
                flameRect.top < fRect.bottom && flameRect.bottom > fRect.top) {
                triggerSequence();
            }
        }

        function onTouchEnd() { isDragging = false; }
        lighter.addEventListener('touchstart', onTouchStart, { passive: false });
        window.addEventListener('touchmove', onTouchMove, { passive: false });
        window.addEventListener('touchend', onTouchEnd);
        lighter.addEventListener('mousedown', onTouchStart);
        window.addEventListener('mousemove', onTouchMove);
        window.addEventListener('mouseup', onTouchEnd);

        function triggerSequence() {
            isDragging = false;
            lighter.style.display = 'none';
            fuse.classList.add('burning');
            infoText.style.opacity = '0';
            setTimeout(() => {
                uiContainer.style.transition = 'opacity 0.6s';
                uiContainer.style.opacity = '0';
                setTimeout(() => {
                    uiContainer.style.display = 'none';
                    showActive = true;
                    startShow();
                }, 600);
            }, 1500);
        }

        // --- GELİŞMİŞ PARLAK HAVAİ FİŞEK MOTORU ---
        class GlowingParticle {
            constructor(x, y, vx, vy, color, size, fade, gravity = 0.05, drag = 0.96) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.color = color;
                this.size = size;
                this.fade = fade;
                this.gravity = gravity;
                this.drag = drag;
                this.alpha = 1;
            }
            update() {
                this.vx *= this.drag; this.vy *= this.drag;
                this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy;
                this.alpha -= this.fade;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = this.size * 2;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Rocket {
            constructor(startX, startY, targetY, isFinal = false) {
                this.x = startX; this.y = startY; this.targetY = targetY;
                this.isFinal = isFinal;
                this.vy = isFinal ? -6 : -Math.random() * 3 - 6;
                this.alive = true;
            }
            update() {
                this.y += this.vy;
                if (this.y <= this.targetY) {
                    this.alive = false;
                    if (this.isFinal) {
                        explodeFinalText(this.x, this.y);
                    } else {
                        explodeStandard(this.x, this.y);
                    }
                }
                if (Math.random() < 0.4) {
                    particles.push(new GlowingParticle(this.x, this.y, Math.random() * 1 - 0.5, 0.5, '#ffaa00', 3, 0.04, 0.01, 0.98));
                }
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffffff';
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x - 1, this.y, 3, 10);
                ctx.restore();
            }
        }

        function explodeStandard(cx, cy) {
            const colors = ['#ff007f', '#00ffcc', '#ffcc00', '#00ffff', '#ff3366', '#b026ff'];
            const chosenColor = colors[Math.floor(Math.random() * colors.length)];
            const isHeart = Math.random() < 0.5;

            if (isHeart) {
                for (let angle = 0; angle < Math.PI * 2; angle += 0.06) {
                    const r = 5.5;
                    const vx = r * 16 * Math.pow(Math.sin(angle), 3) * 0.1;
                    const vy = -r * (13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle)) * 0.1;
                    particles.push(new GlowingParticle(cx, cy, vx, vy, chosenColor, 5, Math.random() * 0.008 + 0.005, 0.03, 0.98));
                }
            } else {
                for (let i = 0; i < 70; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 1;
                    particles.push(new GlowingParticle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, chosenColor, 4, Math.random() * 0.015 + 0.008));
                }
            }
        }

        function explodeFinalText(cx, cy) {
            const pixelSize = 7; 
            const charWidth = 6 * pixelSize; 
            const spacing = 3 * pixelSize; 
            const totalWidth = (wordSequence.length * charWidth) + ((wordSequence.length - 1) * spacing);
            let startX = cx - (totalWidth / 2);

            wordSequence.forEach((char) => {
                const matrix = textGrid[char];
                if (matrix) {
                    matrix.forEach(([row, col]) => {
                        const px = startX + (col * pixelSize);
                        const py = cy + (row * pixelSize) - (3.5 * pixelSize);
                        
                        const color = char === '#' ? '#00ffcc' : '#ff007f';
                        for(let k=0; k<2; k++){
                            particles.push(new GlowingParticle(
                                px + (Math.random()*4-2), py + (Math.random()*4-2), 
                                Math.random() * 0.4 - 0.2, M
