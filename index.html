<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            user-select: none;
        }

        /* 1. Aşama: Çakmak ve Fitil (Doğrudan Başlangıç) */
        #stage2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
        }

        /* Piksel Çakmak Tasarımı */
        #lighter {
            position: absolute;
            top: 60%; left: 30%;
            width: 30px; height: 50px;
            background: #ff5500;
            border: 4px solid #fff;
            cursor: grab;
            z-index: 25;
        }
        #lighter::after {
            content: '';
            position: absolute;
            top: -15px; left: 5px;
            width: 12px; height: 15px;
            background: #ffcc00;
            border-radius: 50% 50% 0 0;
        }

        /* Piksel Havai Fişek Roketi */
        #firework-prop {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 80px;
            background: #cc0000;
            border: 4px solid #fff;
        }
        #firework-prop::before {
            content: '';
            position: absolute;
            top: -20px; left: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 20px solid #fff;
        }

        #fuse {
            position: absolute;
            bottom: 100px; left: 50%;
            width: 4px; height: 80px;
            background: dashed 4px #888;
        }

        /* 2. Aşama: Animasyon */
        canvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* Mesajlar */
        .message {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-shadow: 3px 3px 0px #000;
            width: 90%;
            line-height: 1.8;
        }

        #msg1 {
            font-size: 16px;
            color: #fff;
        }

        #msg2 {
            font-size: 8vw;
            color: #ff0055;
        }

        @media (min-width: 768px) {
            #msg1 { font-size: 24px; width: 70%; }
            #msg2 { font-size: 80px; }
        }
    </style>
</head>
<body>

    <div id="stage2">
        <p style="margin-top: 50px;">Çakmağı fitile sürükle!</p>
        <div id="fuse"></div>
        <div id="firework-prop"></div>
        <div id="lighter" onmousedown="startDrag(event)" ontouchstart="startDrag(event)"></div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="msg1" class="message">
        seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum
    </div>
    <div id="msg2" class="message">
        #İSSAB
    </div>

<script>
    // --- ÇAKMAK VE FİTİL SÜRÜKLEME ---
    const lighter = document.getElementById('lighter');
    const fuse = document.getElementById('fuse');
    let isDragging = false;

    function startDrag(e) {
        isDragging = true;
        lighter.style.cursor = 'grabbing';
    }

    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    function drag(e) {
        if (!isDragging) return;
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);
        
        lighter.style.left = (x - 15) + 'px';
        lighter.style.top = (y - 25) + 'px';

        let fuseRect = fuse.getBoundingClientRect();
        // Fitilin yanma kontrolü
        if (x > fuseRect.left - 30 && x < fuseRect.right + 30 && y > fuseRect.top - 20 && y < fuseRect.bottom + 20) {
            isDragging = false;
            ignite();
        }
    }

    function stopDrag() {
        isDragging = false;
        lighter.style.cursor = 'grab';
    }

    // --- MİNECRAFT KALP HAVAİ FİŞEKLERİ ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let rocketInterval;
    
    function ignite() {
        document.getElementById('stage2').style.display = 'none';
        canvas.style.display = 'block';
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        startFireworksScenario();
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor(x, y, vx, vy, color, type, lifeMultiplier = 1) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.color = color;
            this.type = type; // rocket, big_rocket, spark, big_spark
            this.life = 100 * lifeMultiplier;
            this.maxLife = this.life;
            this.size = (Math.random() * 4 + 4); // Kare pikseller
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            if (this.type === 'spark') {
                this.vy += 0.03; 
                this.life -= 1.5;
            } else if (this.type === 'big_spark') {
                this.vy += 0.05;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= 1;
            }
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    // Matematiksel Kalp Denklemi
    function explodeHeart(startX, startY, isBig = false) {
        const colors = ['#ff0033', '#ff3366', '#ff0055', '#ff99aa', '#ffffff'];
        const scale = isBig ? 0.6 : 0.25; 
        const step = isBig ? 0.05 : 0.1;
        const sparkType = isBig ? 'big_spark' : 'spark';
        const lifeMult = isBig ? 2 : 1;

        for (let t = 0; t < Math.PI * 2; t += step) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            let vx = x * scale;
            let vy = y * scale;
            let color = colors[Math.floor(Math.random() * colors.length)];
            
            particles.push(new Particle(startX, startY, vx, vy, color, sparkType, lifeMult));
            
            if(Math.random() > 0.5) {
                particles.push(new Particle(startX, startY, vx * 0.8, vy * 0.8, color, sparkType, lifeMult));
            }
        }
        
        if (isBig) {
            setTimeout(() => {
                document.getElementById('msg2').style.display = 'block';
            }, 500);
        }
    }

    function launchRocket() {
        const x = Math.random() * (canvas.width * 0.8) + (canvas.width * 0.1);
        const vy = -(Math.random() * 4 + 8);
        particles.push(new Particle(x, canvas.height, 0, vy, '#fff', 'rocket'));
    }

    function launchBigRocket() {
        particles.push(new Particle(canvas.width / 2, canvas.height, 0, -14, '#ff0055', 'big_rocket'));
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw();

            if (p.type === 'rocket' && p.vy >= -1) {
                explodeHeart(p.x, p.y, false);
                particles.splice(i, 1);
                continue;
            } else if (p.type === 'big_rocket' && p.vy >= -1) {
                explodeHeart(p.x, p.y, true);
                particles.splice(i, 1);
                continue;
            }

            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }
        requestAnimationFrame(animate);
    }

    // --- SENARYO AKIŞI ---
    function startFireworksScenario() {
        animate();
        rocketInterval = setInterval(launchRocket, 800);
        launchRocket();
        
        // 4 Saniye sonra romantik mesaj belirecek
        setTimeout(() => {
            document.getElementById('msg1').style.display = 'block';
        }, 4000);

        // 11 Saniye sonra mesaj gizlenecek ve final roketi atılacak
        setTimeout(() => {
            document.getElementById('msg1').style.display = 'none';
            clearInterval(rocketInterval);
            
            // Büyük final roketi
            setTimeout(launchBigRocket, 1000);
        }, 11000);
    }

</script>
</body>
</html>
