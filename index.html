<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sürpriz</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Poppins', sans-serif; }
        #stage2 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s; }
        #canvas { position: absolute; top: 0; left: 0; }
        #msg1 { position: absolute; top: 40%; width: 80%; text-align: center; font-size: 1.8rem; opacity: 0; transition: opacity 2s; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="stage2">
        <div style="font-size: 1.5rem; margin-bottom: 20px;">Ateşlemek için alevi fitile sürükle</div>
        <div id="fuse" style="width: 4px; height: 50px; background: #555;"></div>
        <div id="lighter" style="width: 40px; height: 60px; background: #888; cursor: pointer; position: relative;">
            <div id="flame" style="position: absolute; top: -20px; left: 5px; width: 30px; height: 30px; background: radial-gradient(orange, red); border-radius: 50%; filter: blur(2px);"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>
    <div id="msg1">seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum</div>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const lighter = document.getElementById('lighter'), flame = document.getElementById('flame');
    let particles = [];

    // Ateşleme mekaniği
    lighter.onmousedown = () => {
        document.onmousemove = (e) => {
            lighter.style.left = e.clientX - 20 + 'px';
            lighter.style.top = e.clientY - 30 + 'px';
            if (e.clientY < 300) ignite();
        };
    };
    document.onmouseup = () => document.onmousemove = null;

    function ignite() {
        document.getElementById('stage2').style.opacity = '0';
        setTimeout(() => { document.getElementById('stage2').style.display = 'none'; startShow(); }, 1000);
    }

    class Particle {
        constructor(x, y, color, speed, size) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * speed;
            this.vy = (Math.random() - 0.5) * speed;
            this.alpha = 1; this.size = size;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.02; this.alpha -= 0.008; }
        draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
    }

    function startShow() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        document.getElementById('msg1').style.opacity = '1';
        
        setTimeout(() => {
            document.getElementById('msg1').style.opacity = '0';
            // #İSSAB Yazısını Canvas'a yaz ve dağıt
            ctx.fillStyle = "#ff7eb3";
            ctx.font = "bold 150px 'Pinyon Script', cursive";
            ctx.textAlign = "center";
            ctx.fillText("#İSSAB", canvas.width/2, canvas.height/2);
            
            // Pikselleri al
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<data.length; i+=80) {
                if(data[i+3] > 128) {
                    particles.push(new Particle((i/4)%canvas.width, Math.floor(i/(4*canvas.width)), '#ff7eb3', 3, 2));
                }
            }
        }, 5000);

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1); });
            requestAnimationFrame(loop);
        }
        loop();
    }
</script>
</body>
</html>
