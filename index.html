<<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınama Ekranı</title>
    <style>
        /* Tarayıcının dokunma gecikmesini kapatıyoruz */
        html { touch-action: manipulation; }
        body { 
            background: #110b11; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: sans-serif;
        }
        .container { 
            background: #211421; border: 5px solid #ff007f; padding: 20px; 
            text-align: center; z-index: 99999; width: 80%;
        }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: black; border: 2px solid #ff007f; color: #00ffcc;
            font-size: 16px; /* 16px altı iPhone'da otomatik zoom yapar, bunu engelledik */
        }
        button { 
            background: #ff007f; color: white; border: none; 
            padding: 15px; width: 100%; font-size: 16px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <p style="color:white; font-size: 12px;">Sence hangi ülke?</p>
    <input type="text" id="girdi" placeholder="Cevabı yaz..." autocomplete="off">
    <button id="buton">GİRİŞ YAP</button>
</div>

<script>
    const btn = document.getElementById('buton');
    const input = document.getElementById('girdi');

    function kontrolEt() {
        const val = input.value.toLowerCase().trim();
        // Test için alert ekledim, eğer bu çalışırsa buton tetikleniyor demektir.
        if (val === "isvicre" || val === "isviçre") {
            alert("Tebrikler! Doğru cevap.");
        } else {
            alert("Yanlış cevap, tekrar dene.");
        }
    }

    // click yerine pointerup kullanıyoruz (En garantili yöntem)
    btn.addEventListener('pointerup', function(e) {
        e.preventDefault();
        e.stopPropagation();
        kontrolEt();
    });

    // Klavyeden de çalışması için
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            kontrolEt();
        }
    });
</script>
</body>
</html>
