<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace; /* 8-bit font */
            text-align: center;
            user-select: none;
        }

        /* Sahne 1: Soru Ekranı */
        #stage1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
        }
        
        input {
            background: #222;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
            outline: none;
        }

        button {
            background: #444;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #666; }

        /* Sahne 2: Çakmak ve Fitil */
        #stage2 {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        #firework-prop {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
        }

        #fuse {
            position: absolute;
            bottom: 80px;
            left: 50%;
            width: 4px;
            height: 100px;
            background: dashed 4px #888;
        }

        #lighter {
            position: absolute;
            top: 60%;
            left: 30%;
            font-size: 50px;
            cursor: grab;
            z-index: 10;
        }

        /* Sahne 3: Animasyon Alanı */
        canvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
        }

        /* Mesajlar */
        .message {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            line-height: 1.5;
            z-index: 20;
            text-shadow: 2px 2px 0px #000;
        }

        #final-message { font-size: 40px; color: #ff0055; }
    </style>
</head>
<body>

    <!-- Soru Ekranı -->
    <div id="stage1">
        <p>Bizim için en önemli gün?</p>
        <input type="text" id="answer" placeholder="Örn: 1 Ocak" autocomplete="off">
        <br>
        <button onclick="checkAnswer()">Cevapla</button>
    </div>

    <!-- Etkileşim Ekranı -->
    <div id="stage2">
        <p style="margin-top: 50px;">Çakmağı fitile sürükle!</p>
        <div id="fuse"></div>
        <div id="firework-prop">🧨</div>
        <div id="lighter" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">🔥</div>
    </div>

    <!-- Animasyon Ekranı -->
    <canvas id="canvas"></canvas>

    <!-- Yazılar -->
    <div id="msg1" class="message">Seni sevdiğimi hiç unutma</div>
    <div id="msg2" class="message" id="final-message">#İSSAB</div>

<script>
    // 1. Aşama: Soru Kontrolü
    function checkAnswer() {
        const val = document.getElementById('answer').value.trim().toLowerCase();
        if (val === '9 mart') {
            document.getElementById('stage1').style.display = 'none';
            document.getElementById('stage2').style.display = 'block';
        } else {
            alert('Yanlış cevap! Tekrar dene.');
        }
    }

    // 2. Aşama: Çakmak Sürükleme
    const lighter = document.getElementById('lighter');
    const fuse = document.getElementById('fuse');
    let isDragging = false;

    function startDrag(e) {
        isDragging = true;
        lighter.style.cursor = 'grabbing';
    }

    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    function drag(e) {
        if (!isDragging) return;
        let x = e.clientX || e.touches[0].clientX;
        let y = e.clientY || e.touches[0].clientY;
        lighter.style.left = (x - 25) + 'px';
        lighter.style.top = (y - 25) + 'px';

        // Fitile değme kontrolü
        let fuseRect = fuse.getBoundingClientRect();
        if (x > fuseRect.left - 20 && x < fuseRect.right + 20 && y > fuseRect.top && y < fuseRect.bottom) {
            isDragging = false;
            ignite();
        }
    }

    function stopDrag() {
        isDragging = false;
        lighter.style.cursor = 'grab';
    }

    // 3. Aşama: Havai Fişek Animasyonu (Minecraft tarzı pikselli)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let roses = [];
    let animationPhase = 0;

    function ignite() {
        document.getElementById('stage2').style.display = 'none';
        canvas.style.display = 'block';
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // İlk Havai fişeği fırlat
        particles.push(new Particle(canvas.width/2, canvas.height, 0, -15, '#fff', 'rocket'));
        animate();
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor(x, y, vx, vy, color, type) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.color = color;
            this.type = type; // 'rocket', 'spark', 'rose', 'big_rocket'
            this.life = 100;
            this.size = type === 'rose' ? 20 : (Math.random() * 4 + 4);
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.type !== 'rocket' && this.type !== 'big_rocket') {
                this.vy += 0.05; // Yerçekimi
                this.life -= 1;
            }
        }
        draw() {
            if (this.type === 'rose') {
                ctx.font = '20px Arial';
                ctx.fillText('🖤', this.x, this.y); // Siyah Gül efekti için siyah kalp
            } else {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size); // 8-bit kare pikseller
            }
        }
    }

    function explode(x, y, type) {
        let colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
        let count = type === 'big' ? 150 : 50;
        
        for (let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * (type === 'big' ? 8 : 4);
            let color = colors[Math.floor(Math.random() * colors.length)];
            
            particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                color,
                'spark'
            ));

            // Siyah Güller
            if (Math.random() > 0.7 && type !== 'big') {
                particles.push(new Particle(
                    x, y,
                    Math.cos(angle) * (speed * 0.8),
                    Math.sin(angle) * (speed * 0.8),
                    '#000',
                    'rose'
                ));
            }
        }

        if (animationPhase === 0) {
            animationPhase = 1;
            setTimeout(() => {
                document.getElementById('msg1').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('msg1').style.display = 'none';
                    // Kocaman havai fişek
                    particles.push(new Particle(canvas.width/2, canvas.height, 0, -20, '#fff', 'big_rocket'));
                }, 3000);
            }, 1500);
        } else if (animationPhase === 1 && type === 'big') {
            animationPhase = 2;
            setTimeout(() => {
                let msg2 = document.getElementById('msg2');
                msg2.style.display = 'block';
                msg2.style.fontSize = '10vw';
                msg2.style.color = '#fff';
            }, 1000);
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Kuyruk efekti
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw();

            // Roket patlama noktası
            if ((p.type === 'rocket' && p.vy >= -2) || (p.type === 'big_rocket' && p.vy >= -2)) {
                explode(p.x, p.y, p.type === 'big_rocket' ? 'big' : 'normal');
                particles.splice(i, 1);
                continue;
            }

            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
