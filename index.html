<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musab'ı Yakala!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ff3e3e;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 3px 3px #000;
            text-align: center;
        }

        .subtitle {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 20px;
            text-align: center;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        canvas {
            background-color: #3e2723; /* Okul koridoru kahverengisi */
            display: block;
            border: 6px solid #fff;
            image-rendering: pixelated; /* Pixel art keskinliği için */
        }

        .controls {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>MUSAB'I YAKALA!</h1>
    <div class="subtitle">Müdür Yardımcısının odasına varmadan onu durdur!</div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <div class="controls">
        [▲] [▼] Yön Tuşları ile Şerit Değiştir<br>
        Sıralardan Kaç! Tostları Topla! Musab'a Yetiş!
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Oyun Durumu
        let gameState = "START"; // START, PLAYING, WIN, GAMEOVER
        
        // Şeritler (Y koordinatları)
        const lanes = [160, 240, 320];
        
        // Oyuncu Bilgileri
        let player = {
            lane: 1,
            x: 100,
            y: lanes[1],
            size: 32,
            speed: 5,
            color: "#4caf50" // Yeşil ceketli oyuncu
        };

        // Musab Bilgileri
        let musab = {
            lane: 1,
            x: 450, // Oyuncunun önünde başlar
            y: lanes[1],
            size: 32,
            speed: 4.2,
            color: "#2196f3", // Mavi ceketli Musab
            laneTimer: 0
        };

        // Oyun İlerleme Metrikleri
        let targetDistance = 3000; // Müdür odasına olan toplam mesafe
        let distanceTraveled = 0; // Alınan yol
        let speedBoost = 0;

        // Objeler
        let obstacles = [];
        let items = [];
        
        // Arka plan dekorasyonu (Dolaplar vb.)
        let bgElements = [];
        for(let i = 0; i < 10; i++) {
            bgElements.push({ x: i * 100, width: 60 });
        }

        // Klavye Dinleyicisi
        window.addEventListener("keydown", (e) => {
            if (gameState === "START" || gameState === "WIN" || gameState === "GAMEOVER") {
                if (e.key === " " || e.key === "Enter") {
                    resetGame();
                    gameState = "PLAYING";
                }
                return;
            }

            if (e.key === "ArrowUp" && player.lane > 0) {
                player.lane--;
            }
            if (e.key === "ArrowDown" && player.lane < 2) {
                player.lane++;
            }
        });

        function resetGame() {
            player.lane = 1;
            player.x = 100;
            musab.lane = 1;
            musab.x = 450;
            distanceTraveled = 0;
            speedBoost = 0;
            obstacles = [];
            items = [];
        }

        // Çarpışma Testi
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.size &&
                   rect1.x + rect1.size > rect2.x &&
                   rect1.y < rect2.y + rect2.size &&
                   rect1.y + rect1.size > rect2.y;
        }

        // Pixel Art Karakter Çizici (Basit Bloklu Tasarım)
        function drawPixelCharacter(ctx, x, y, color, isMusab) {
            // Gövde
            ctx.fillStyle = color;
            ctx.fillRect(x, y + 8, 32, 20);
            // Kafa
            ctx.fillStyle = "#ffcc99";
            ctx.fillRect(x + 6, y, 20, 12);
            // Saç
            ctx.fillStyle = isMusab ? "#ff9800" : "#3e2723"; // Musab turuncu saçlı olsun :)
            ctx.fillRect(x + 6, y, 20, 4);
            // Gözler
            ctx.fillStyle = "#000";
            ctx.fillRect(x + 18, y + 4, 4, 4);
            // Ayaklar (Koşma efekti için basit kareler)
            ctx.fillStyle = "#111";
            let legOffset = (Math.floor(Date.now() / 100) % 2) * 4;
            ctx.fillRect(x + 6, y + 28, 6, 4 + legOffset);
            ctx.fillRect(x + 20, y + 28, 6, 8 - legOffset);
        }

        // Güncelleme Döngüsü
        function update() {
            if (gameState !== "PLAYING") return;

            // Arka planı kaydır (Dünyanın hareket hissi)
            let currentSpeed = player.speed + speedBoost;
            distanceTraveled += currentSpeed * 0.2;

            bgElements.forEach(el => {
                el.x -= currentSpeed;
                if (el.x < -100) el.x = canvas.width + Math.random() * 50;
            });

            // Oyuncu Hedef Y Pozisyonuna Yumuşak Geçiş Yapar
            player.y += (lanes[player.lane] - player.y) * 0.3;

            // Musab Yapay Zekası (Rastgele Şerit Değiştirir ve Kaçar)
            musab.laneTimer++;
            if (musab.laneTimer > 60 + Math.random() * 60) {
                let change = Math.random() > 0.5 ? 1 : -1;
                musab.lane = Math.max(0, Math.min(2, musab.lane + change));
                musab.laneTimer = 0;
            }
            musab.y += (lanes[musab.lane] - musab.y) * 0.2;

            // Musab'ın oyuncuya göre konumu (Mesafe açma/kapanma mekaniği)
            // Musab sabit kaçar, oyuncu engellere göre yaklaşır veya uzaklaşır
            let relativeSpeed = currentSpeed - musab.speed;
            musab.x += relativeSpeed;

            // Sınır koruması
            if (musab.x < player.x + 20) musab.x = player.x + 20; 

            // Hız bonusunu yavaşça sıfırla
            if (speedBoost > 0) speedBoost -= 0.02;

            // Engel Üretimi (Sıralar)
            if (Math.random() < 0.015 && obstacles.length < 3) {
                obstacles.push({
                    x: canvas.width,
                    lane: Math.floor(Math.random() * 3),
                    size: 30,
                    type: Math.random() > 0.5 ? 'desk' : 'bin'
                });
            }

            // Tost Üretimi
            if (Math.random() < 0.01 && items.length < 2) {
                items.push({
                    x: canvas.width,
                    lane: Math.floor(Math.random() * 3),
                    size: 20
                });
            }

            // Engelleri Güncelle ve Kontrol Et
            obstacles.forEach((obs, index) => {
                obs.x -= currentSpeed;
                obs.y = lanes[obs.lane] + 4;

                // Oyuncu Engele Çarparsa
                if (checkCollision({x: player.x, y: player.y, size: player.size}, obs)) {
                    speedBoost = -2.5; // Büyük yavaşlama cezası
                    obstacles.splice(index, 1);
                }

                // Musab engele çarpmaz (O profesyonel bir kaçak!)
                if (obs.x < -50) obstacles.splice(index, 1);
            });

            // Tostları Güncelle ve Kontrol Et
            items.forEach((item, index) => {
                item.x -= currentSpeed;
                item.y = lanes[item.lane] + 8;

                if (checkCollision({x: player.x, y: player.y, size: player.size}, item)) {
                    speedBoost = 4; // Hız patlaması
                    items.splice(index, 1);
                }

                if (item.x < -50) items.splice(index, 1);
            });

            // KAZANMA ŞARTI: Musab'ı yakaladın mı?
            if (musab.x <= player.x + 35 && player.lane === musab.lane) {
                gameState = "WIN";
            }

            // KAYBETME ŞARTI: Musab odaya ulaştı mı?
            if (distanceTraveled >= targetDistance) {
                gameState = "GAMEOVER";
            }
        }

        // Çizim Döngüsü
        function draw() {
            // Ekranı Temizle
            ctx.fillStyle = "#3e2723"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Üst Duvar / Koridor Yapısı
            ctx.fillStyle = "#bcaa99";
            ctx.fillRect(0, 0, canvas.width, 120);
            ctx.fillStyle = "#9e8e7f";
            ctx.fillRect(0, 110, canvas.width, 10);

            // Sınıf Kapıları ve Dolaplar (Pixel Art Tarzı Arka Plan)
            bgElements.forEach(el => {
                ctx.fillStyle = "#5d4037"; // Kapı/Dolap rengi
                ctx.fillRect(el.x, 30, el.width, 80);
                ctx.fillStyle = "#ffd54f"; // Kapı kolu
                ctx.fillRect(el.x + el.width - 10, 70, 4, 6);
            });

            // Şerit Çizgileri (Okul Koridor Karoları Hissiyatı)
            ctx.strokeStyle = "#4e342e";
            ctx.lineWidth = 4;
            lanes.forEach(laneY => {
                ctx.beginPath();
                ctx.moveTo(0, laneY + 32);
                ctx.lineTo(canvas.width, laneY + 32);
                ctx.stroke();
            });

            if (gameState === "PLAYING" || gameState === "WIN" || gameState === "GAMEOVER") {
                // Tostları Çiz
                items.forEach(item => {
                    ctx.fillStyle = "#ffb74d"; // Tost Üçgeni
                    ctx.beginPath();
                    ctx.moveTo(item.x, item.y + item.size);
                    ctx.lineTo(item.x + item.size/2, item.y);
                    ctx.lineTo(item.x + item.size, item.y + item.size);
                    ctx.fill();
                    ctx.fillStyle = "#e65100"; // Sucuk detayları
                    ctx.fillRect(item.x + 6, item.y + 10, 4, 4);
                });

                // Engelleri Çiz
                obstacles.forEach(obs => {
                    if (obs.type === 'desk') {
                        ctx.fillStyle = "#a1887f"; // Okul Sırası
                        ctx.fillRect(obs.x, obs.y, obs.size, obs.size);
                        ctx.fillStyle = "#4e342e"; // Sıra Ayakları
                        ctx.fillRect(obs.x + 2, obs.y + obs.size - 6, 4, 6);
                        ctx.fillRect(obs.x + obs.size - 6, obs.y + obs.size - 6, 4, 6);
                    } else {
                        ctx.fillStyle = "#78909c"; // Çöp Kovası
                        ctx.fillRect(obs.x + 4, obs.y + 4, obs.size - 8, obs.size - 4);
                        ctx.fillStyle = "#37474f";
                        ctx.fillRect(obs.x + 2, obs.y, obs.size - 4, 4);
                    }
                });

                // Karakterleri Çiz
                drawPixelCharacter(ctx, player.x, player.y, player.color, false);
                drawPixelCharacter(ctx, musab.x, musab.y, musab.color, true);

                // --- UI / ARAYÜZ ELEMANLARI ---
                
                // Üst Bar (Mesafe İlerlemesi)
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(200, 15, 400, 20);
                
                // İlerleme Çubuğu İçeriği
                let progressWidth = (distanceTraveled / targetDistance) * 400;
                ctx.fillStyle = "#ff9800";
                ctx.fillRect(200, 15, progressWidth, 20);

                // Bar Üzerindeki Simgeler (Basit Göstergeler)
                ctx.fillStyle = "#ff3e3e"; // Müdürün Odası (Hedef Kapı simgesi)
                ctx.fillRect(590, 10, 15, 30); 
                ctx.fillStyle = "#fff";
                ctx.font = "8px 'Press Start 2P'";
                ctx.fillText("MÜDÜR YRD.", 540, 55);

                // Hız Efekti Çubuğu
                if(speedBoost > 0) {
                    ctx.fillStyle = "#26a69a";
                    ctx.fillText("TOST GÜCÜ!", 20, 35);
                    ctx.fillRect(20, 45, speedBoost * 20, 8);
                }
            }

            // Ekran Durum Yazıları
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";

            if (gameState === "START") {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "16px 'Press Start 2P'";
                ctx.fillText("BAŞLAMAK İÇİN ENTER'A BAS", canvas.width / 2, canvas.height / 2);
                ctx.font = "10px 'Press Start 2P'";
                ctx.fillStyle = "#aaa";
                ctx.fillText("Musab seni şikayet etmeden onu yakalamalısın!", canvas.width / 2, canvas.height / 2 + 40);
            }

            if (gameState === "WIN") {
                ctx.fillStyle = "rgba(0,150,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "20px 'Press Start 2P'";
                ctx.fillText("BAŞARDIN! MUSAB'I YAKALADIN!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "10px 'Press Start 2P'";
                ctx.fillText("Sırrın güvende kaldı. Yeniden oynamak için ENTER.", canvas.width / 2, canvas.height / 2 + 30);
            }

            if (gameState === "GAMEOVER") {
                ctx.fillStyle = "rgba(150,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "20px 'Press Start 2P'";
                ctx.fillText("GEÇ KALDIN!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "10px 'Press Start 2P'";
                ctx.fillStyle = "#ffcc99";
                ctx.fillText("Musab odaya girdi ve seni şikayet etti!", canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillStyle = "#fff";
                ctx.fillText("Yeniden denemek için ENTER'a bas.", canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        // Ana Oyun Döngüsü
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Oyunu Başlat
        gameLoop();
    </script>
</body>
</html>
