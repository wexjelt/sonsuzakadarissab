<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            user-select: none;
        }

        /* 1. Aşama: Soru */
        #stage1 {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            z-index: 30;
        }
        
        input {
            background: #222;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
            outline: none;
        }

        button {
            background: #444;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #666; }

        /* 2. Aşama: Çakmak ve Fitil */
        #stage2 {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
        }

        /* Piksel Çakmak Tasarımı */
        #lighter {
            position: absolute;
            top: 60%; left: 30%;
            width: 30px; height: 50px;
            background: #ff5500;
            border: 4px solid #fff;
            cursor: grab;
            z-index: 25;
        }
        #lighter::after {
            content: '';
            position: absolute;
            top: -15px; left: 5px;
            width: 12px; height: 15px;
            background: #ffcc00;
            border-radius: 50% 50% 0 0;
        }

        /* Piksel Havai Fişek Roketi */
        #firework-prop {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 80px;
            background: #cc0000;
            border: 4px solid #fff;
        }
        #firework-prop::before {
            content: '';
            position: absolute;
            top: -20px; left: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 20px solid #fff;
        }

        #fuse {
            position: absolute;
            bottom: 100px; left: 50%;
            width: 4px; height: 80px;
            background: dashed 4px #888;
        }

        /* 3. Aşama: Animasyon */
        canvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* Mesajlar */
        .message {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-shadow: 3px 3px 0px #000;
            width: 90%;
            line-height: 1.8;
        }

        #msg1 {
            font-size: 16px;
            color: #fff;
        }

        #msg2 {
            font-size: 8vw;
            color: #ff0055;
        }

        @media (min-width: 768px) {
            #msg1 { font-size: 24px; width: 70%; }
            #msg2 { font-size: 80px; }
        }
    </style>
</head>
<body>

    <div id="stage1">
        <p>Bizim için en önemli gün?</p>
        <input type="text" id="answer" placeholder="Örn: 1 Ocak" autocomplete="off">
        <br>
        <button onclick="checkAnswer()">Cevapla</button>
    </div>

    <div id="stage2">
        <p style="margin-top: 50px;">Çakmağı fitile sürükle!</p>
        <div id="fuse"></div>
        <div id="firework-prop"></div>
        <div id="lighter" onmousedown="startDrag(event)" ontouchstart="startDrag(event)"></div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="msg1" class="message">
        seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum
    </div>
    <div id="msg2" class="message">
        #İSSAB
    </div>

<script>
    // --- AŞAMA 1: ŞİFRE ---
    function checkAnswer() {
        const val = document.getElementById('answer').value.trim().toLowerCase();
        if (val === '9 mart') {
            document.getElementById('stage1').style.display = 'none';
            document.getElementById('stage2').style.display = 'block';
        } else {
            alert('Yanlış cevap! Tekrar dene.');
        }
    }

    // --- AŞAMA 2: ÇAKMAK VE FİTİL ---
    const lighter = document.getElementById('lighter');
    const fuse = document.getElementById('fuse');
    let isDragging = false;

    function startDrag(e) {
        isDragging = true;
        lighter.style.cursor = 'grabbing';
    }

    document.addEventListener('touchmove', drag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);
