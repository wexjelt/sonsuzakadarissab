<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Her Şeyin Başladığı Gün...</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            background-color: #1a0f1a;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: relative;
            font-family: 'Press Start 2P', monospace;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #quiz-overlay {
            position: absolute;
            inset: 0;
            background: #1a0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .quiz-box {
            background: #2b1625;
            border: 6px solid #ff66aa;
            padding: 30px;
            text-align: center;
        }

        .quiz-input, .quiz-btn {
            width: 100%;
            margin-top: 10px;
        }

        #ui-container {
            position: absolute;
            inset: 0;
            display: none;
        }

        #lighter {
            position: absolute;
            bottom: 8%;
            left: 50%;
            width: 44px;
            height: 64px;
            background: #ff55aa;
        }

        #fuse {
            position: absolute;
            top: -24px;
            left: 50%;
            width: 8px;
            height: 24px;
            transform: translateX(-50%);
            background: #444;
        }

        #fuse.burning {
            background: #ff3388;
        }

        .love-message {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: white;
            opacity: 0;
            transition: 2s;
        }

        .love-message.show {
            opacity: 1;
        }
    </style>
</head>

<body>

<div id="quiz-overlay">
    <div class="quiz-box">
        <div>Her şeyin başladığı gün?</div>
        <input id="quiz-answer" class="quiz-input">
        <button id="quiz-submit-btn" class="quiz-btn">GİRİŞ</button>
        <div id="quiz-error" style="color:red;opacity:0;">Yanlış</div>
    </div>
</div>

<canvas id="canvas"></canvas>

<div id="ui-container">
    <div id="lighter"><div id="fuse"></div></div>
</div>

<div class="love-message" id="msg">Seni seviyorum...</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let rockets = [];
let particles = [];
let showActive = false;
let timeline = 0;

/* QUIZ */
document.getElementById("quiz-submit-btn").onclick = () => {
let v = document.getElementById("quiz-answer").value.replace(/[^0-9]/g,"");

if(v==="09032026"||v==="932026"){
document.getElementById("quiz-overlay").style.display="none";
document.getElementById("ui-container").style.display="flex";
showActive = true;
loop();
}else{
document.getElementById("quiz-error").style.opacity=1;
setTimeout(()=>document.getElementById("quiz-error").style.opacity=0,2000);
}
};

/* PARTICLE */
class P {
constructor(x,y,vx,vy,c){
this.x=x;this.y=y;
this.vx=vx;this.vy=vy;
this.c=c;
this.a=1;
}
update(){
this.x+=this.vx;
this.y+=this.vy;
this.vy+=0.02;
this.a-=0.02;
}
draw(){
ctx.globalAlpha=this.a;
ctx.fillStyle=this.c;
ctx.fillRect(this.x,this.y,4,4);
ctx.globalAlpha=1;
}
}

/* ROCKET */
class R {
constructor(){
this.x=Math.random()*canvas.width;
this.y=canvas.height;
this.vy=-6;
this.dead=false;
}
update(){
this.y+=this.vy;

if(Math.random()<0.3){
particles.push(new P(this.x,this.y,Math.random()-0.5,Math.random()-0.5,"#ff66aa"));
}

if(this.y<canvas.height*0.3){
for(let i=0;i<40;i++){
particles.push(new P(this.x,this.y,Math.random()-0.5,Math.random()-0.5,"#fff"));
}
this.dead=true;
}
}
draw(){
ctx.fillStyle="#fff";
ctx.fillRect(this.x,this.y,3,10);
}
}

/* LOOP — SADECE BURASI DÜZELTİLDİ */
function loop(){
if(!showActive) return;

requestAnimationFrame(loop);

ctx.fillStyle="rgba(26,15,26,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

timeline++;

if(timeline%60===0){
rockets.push(new R());
}

/* ✅ FIX: forEach + splice kaldırıldı */
for(let i=rockets.length-1;i>=0;i--){
rockets[i].update();
rockets[i].draw();
if(rockets[i].dead) rockets.splice(i,1);
}

for(let i=particles.length-1;i>=0;i--){
particles[i].update();
particles[i].draw();
if(particles[i].a<=0) particles.splice(i,1);
}
}
</script>

</body>
</html>
