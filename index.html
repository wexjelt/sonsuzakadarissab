<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz - Rick and Morty Uzayı</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a1a;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            user-select: none;
        }

        #stage2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s;
        }

        .instruction {
            margin-top: 10vh;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: pulseText 2s infinite;
        }

        #lighter {
            position: absolute;
            top: 65%; left: 30%;
            width: 40px; height: 75px;
            background: linear-gradient(135deg, #e0e0e0 0%, #9e9e9e 50%, #616161 100%);
            border-radius: 8px;
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.6);
            cursor: grab;
            z-index: 25;
            transition: transform 0.1s;
        }
        #lighter:active { cursor: grabbing; transform: scale(0.95); }
        
        #lighter::before {
            content: ''; position: absolute;
            top: -15px; left: 0;
            width: 40px; height: 15px;
            background: linear-gradient(135deg, #bdbdbd 0%, #757575 100%);
            border-radius: 8px 8px 0 0;
            transform-origin: bottom left;
            transform: rotate(-45deg);
        }

        .flame {
            position: absolute;
            top: -35px; left: 10px;
            width: 20px; height: 35px;
            background: radial-gradient(circle at 50% 100%, #fff 0%, #ffeb3b 30%, #ff5722 70%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff5722, 0 0 40px #ffeb3b;
            animation: flicker 0.1s infinite alternate;
            pointer-events: none;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.1) rotate(2deg); opacity: 1; }
        }

        #firework-prop {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 30px; height: 100px;
            background: linear-gradient(to right, #b71c1c, #d32f2f, #b71c1c);
            border-radius: 3px 3px 0 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        #firework-prop::before {
            content: ''; position: absolute;
            top: -25px; left: -5px;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 25px solid #ff5252;
        }

        #fuse {
            position: absolute;
            bottom: 120px; left: 50%;
            width: 4px; height: 80px;
            background: #795548;
            border-radius: 2px;
            box-shadow: inset 1px 0 2px rgba(0,0,0,0.5);
        }

        canvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .message {
            display: none;
            position: absolute;
            left: 50%;
            z-index: 10;
            width: 90%;
            line-height: 1.6;
        }

        #msg1 {
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #msg2 {
            top: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive;
            font-weight: 700;
            font-size: 12vw;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.9), 0 0 60px rgba(255, 20, 147, 0.7), 0 0 100px #ff1493;
            opacity: 0;
            display: none;
            white-space: nowrap;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (min-width: 768px) {
            #msg1 { font-size: 2.5rem; width: 70%; }
            #msg2 { font-size: 8rem; }
        }
    </style>
</head>
<body>

    <div id="stage2">
        <div class="instruction">Ateşlemek için alevi fitile sürükle</div>
        <div id="fuse"></div>
        <div id="firework-prop"></div>
        
        <div id="lighter" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
            <div class="flame" id="flame"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="msg1" class="message">
        seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum
    </div>
    
    <div id="msg2" class="message">
        #İSSAB
    </div>

<script>
    // --- ÇAKMAK KONTROLLERİ ---
    const lighter = document.getElementById('lighter');
    const fuse = document.getElementById('fuse');
    let isDragging = false;

    function startDrag(e) { isDragging = true; }

    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    function drag(e) {
        if (!isDragging) return;
        if(e.type === 'touchmove') e.preventDefault(); 
        
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);
        
        lighter.style.left = (x - 20) + 'px';
        lighter.style.top = (y - 35) + 'px';

        let fuseRect = fuse.getBoundingClientRect();
        let flameRect = document.getElementById('flame').getBoundingClientRect();
        
        if (flameRect.right > fuseRect.left && flameRect.left < fuseRect.right &&
            flameRect.bottom > fuseRect.top && flameRect.top < fuseRect.bottom) {
            isDragging = false;
            ignite();
        }
    }

    function stopDrag() { isDragging = false; }

    // --- HAVAİ FİŞEK MOTORU ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let rocketInterval;
    let textFadeInterval = null;
    let stars = [];
    let planets = [];
    let time = 0;

    function ignite() {
        document.getElementById('stage2').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('stage2').style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            startFireworksScenario();
        }, 500);
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        generateStarsAndPlanets();
    }

    // --- RICK AND MORTY TARZI UZAY MANZARASI ---
    function generateStarsAndPlanets() {
        stars = [];
        // Yıldızlar: 350 adet, farklı renklerde
        for (let i = 0; i < 350; i++) {
            const colors = ['#ffffff', '#aaccff', '#ffdd99', '#ffaa88', '#88ddff'];
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.9,
                radius: Math.random() * 3 + 0.5,
                baseOpacity: Math.random() * 0.8 + 0.2,
                speed: Math.random() * 0.025 + 0.005,
                phase: Math.random() * Math.PI * 2,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        // Gezegenler
        planets = [];
        // 1. Yeşil-turuncu halkalı gezegen (sol üst)
        planets.push({
            x: canvas.width * 0.12,
            y: canvas.height * 0.20,
            radius: Math.min(canvas.width, canvas.height) * 0.045,
            color1: '#2e8b57',
            color2: '#ff8c00',
            hasRing: true,
            ringColor: '#ffa500',
            ringTilt: 0.3
        });
        // 2. Kırmızı volkanik gezegen (sağ alt)
        planets.push({
            x: canvas.width * 0.85,
            y: canvas.height * 0.75,
            radius: Math.min(canvas.width, canvas.height) * 0.06,
            color1: '#b22222',
            color2: '#8b0000',
            hasRing: false,
            hasSpots: true
        });
        // 3. Mavi buz gezegeni (orta sol)
        planets.push({
            x: canvas.width * 0.25,
            y: canvas.height * 0.65,
            radius: Math.min(canvas.width, canvas.height) * 0.035,
            color1: '#1e90ff',
            color2: '#00bfff',
            hasRing: false,
            hasSpots: false
        });
        // 4. Mor gaz devi (sağ üst)
        planets.push({
            x: canvas.width * 0.70,
            y: canvas.height * 0.10,
            radius: Math.min(canvas.width, canvas.height) * 0.055,
            color1: '#8a2be2',
            color2: '#dda0dd',
            hasRing: false,
            hasBands: true
        });
    }

    function drawRickAndMortySky() {
        // 1. Derin uzay gradienti (siyah-mor-mavi)
        const grad = ctx.createRadialGradient(
            canvas.width * 0.3, canvas.height * 0.2, 100,
            canvas.width * 0.5, canvas.height * 0.5, canvas.width * 1.2
        );
        grad.addColorStop(0, '#1a0a2e');
        grad.addColorStop(0.3, '#0f1a3a');
        grad.addColorStop(0.7, '#050a15');
        grad.addColorStop(1, '#010105');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Bulutsular (renkli, yarı saydam dağınık alanlar)
        const nebulaColors = [
            { x: 0.2, y: 0.3, r: 0.25, color: 'rgba(255, 80, 180, 0.08)' },
            { x: 0.7, y: 0.4, r: 0.3, color: 'rgba(0, 200, 255, 0.06)' },
            { x: 0.5, y: 0.7, r: 0.35, color: 'rgba(255, 150, 50, 0.07)' },
            { x: 0.85, y: 0.15, r: 0.2, color: 'rgba(200, 50, 255, 0.05)' },
        ];
        for (let n of nebulaColors) {
            const grd = ctx.createRadialGradient(
                n.x * canvas.width, n.y * canvas.height, 0,
                n.x * canvas.width, n.y * canvas.height, n.r * canvas.width
            );
            grd.addColorStop(0, n.color);
            grd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 3. Gezegenler
        for (let p of planets) {
            // Işık halesi
            const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
            glow.addColorStop(0, 'rgba(255,255,200,0.05)');
            glow.addColorStop(1, 'rgba(255,255,200,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
            ctx.fill();

            // Gezegen gövdesi
            const gradPlanet = ctx.createRadialGradient(
                p.x - p.radius * 0.3, p.y - p.radius * 0.3, p.radius * 0.1,
                p.x, p.y, p.radius
            );
            gradPlanet.addColorStop(0, p.color2);
            gradPlanet.addColorStop(1, p.color1);
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255,255,200,0.2)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = gradPlanet;
            ctx.fill();

            // Halka (eğer varsa)
            if (p.hasRing) {
                ctx.shadowBlur = 0;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.ringTilt);
                ctx.strokeStyle = p.ringColor;
                ctx.lineWidth = p.radius * 0.25;
                ctx.globalAlpha = 0.7;
                ctx.beginPath();
                ctx.ellipse(0, 0, p.radius * 1.8, p.radius * 0.6, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.restore();
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255,200,100,0.2)';
            }

            // Yüzey detayları (krater, benek, bant)
            ctx.shadowBlur = 0;
            if (p.hasSpots) {
                for (let i = 0; i < 8; i++) {
                    const ang = Math.random() * 2 * Math.PI;
                    const dist = Math.random() * p.radius * 0.7;
                    const sx = p.x + Math.cos(ang) * dist;
                    const sy = p.y + Math.sin(ang) * dist;
                    ctx.beginPath();
                    ctx.arc(sx, sy, p.radius * 0.08 + Math.random() * 0.05, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fill();
                }
            }
            if (p.hasBands) {
                for (let i = -2; i <= 2; i++) {
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y + i * p.radius * 0.25, p.radius * 0.9, p.radius * 0.08, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fill();
                }
            }
        }

        // 4. Yıldızlar (parıldama)
        time += 0.01;
        for (let star of stars) {
            const opacity = star.baseOpacity * (0.6 + 0.4 * Math.sin(time * star.speed + star.phase));
            ctx.shadowBlur = 12;
            ctx.shadowColor = star.color;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = star.color;
            ctx.globalAlpha = opacity;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        ctx.shadowBlur = 0;

        // 5. Ay (Rick and Morty tarzı – turuncu-sarı, büyük)
        const moonX = canvas.width * 0.82;
        const moonY = canvas.height * 0.15;
        const moonRadius = Math.min(canvas.width, canvas.height) * 0.1;

        // Ay halesi
        const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonRadius * 2.5);
        moonGlow.addColorStop(0, 'rgba(255, 200, 100, 0.4)');
        moonGlow.addColorStop(1, 'rgba(255, 200, 100, 0)');
        ctx.fillStyle = moonGlow;
        ctx.beginPath();
        ctx.arc(moonX, moonY, moonRadius * 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Ay gövdesi
        const moonGrad = ctx.createRadialGradient(
            moonX - moonRadius * 0.4, moonY - moonRadius * 0.4, moonRadius * 0.1,
            moonX, moonY, moonRadius
        );
        moonGrad.addColorStop(0, '#ffe68f');
        moonGrad.addColorStop(0.5, '#f0b040');
        moonGrad.addColorStop(1, '#c07020');
        ctx.shadowBlur = 60;
        ctx.shadowColor = 'rgba(255, 200, 100, 0.5)';
        ctx.beginPath();
        ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
        ctx.fillStyle = moonGrad;
        ctx.fill();

        // Kraterler (çizgi film tarzı)
        ctx.shadowBlur = 0;
        const craters = [
            { dx: -0.25, dy: -0.20, r: 0.18 },
            { dx: 0.30, dy: 0.15, r: 0.12 },
            { dx: -0.10, dy: 0.30, r: 0.10 },
            { dx: 0.15, dy: -0.30, r: 0.08 },
            { dx: -0.35, dy: 0.05, r: 0.06 },
        ];
        for (let c of craters) {
            const cx = moonX + c.dx * moonRadius;
            const cy = moonY + c.dy * moonRadius;
            ctx.beginPath();
            ctx.arc(cx, cy, c.r * moonRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(180, 100, 40, 0.3)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx - 2, cy - 2, c.r * moonRadius * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 220, 160, 0.15)';
            ctx.fill();
        }

        // 6. Uzay tozu (minik parlak noktacıklar)
        for (let i = 0; i < 80; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const r = Math.random() * 1.5 + 0.3;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.2})`;
            ctx.fill();
        }
    }

    // --- PARÇACIK SINIFI ---
    class Particle {
        constructor(x, y, vx, vy, color, type) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.color = color;
            this.type = type;
            this.alpha = 1;
            
            if (type === 'big_spark') {
                this.decay = Math.random() * 0.003 + 0.004;
                this.size = Math.random() * 5 + 3.5;
            } else if (type === 'text_spark') {
                this.decay = Math.random() * 0.005 + 0.006;
                this.size = Math.random() * 4 + 2;
            } else {
                this.decay = Math.random() * 0.012 + 0.012;
                this.size = type === 'rocket' || type === 'big_rocket' ? 4 : (Math.random() * 3.5 + 2.5);
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            if (this.type === 'spark' || this.type === 'text_spark') {
                this.vx *= 0.93;
                this.vy *= 0.93;
                this.vy += 0.04;
                this.alpha -= this.decay;
            } else if (this.type === 'big_spark') {
                this.vx *= 0.96;
                this.vy *= 0.96;
                this.vy += 0.012;
                this.alpha -= this.decay;
            } else {
                this.vy += 0.15;
            }
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.globalCompositeOperation = 'lighter'; 
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // --- PATLAMA FONKSİYONLARI ---
    function explodeShape(startX, startY, shapeType, isBig = false) {
        const colors = ['#ff2a5f', '#ff7eb3', '#ff0055', '#ff99aa', '#fff'];
        
        const particleCount = isBig ? 650 : 180; 
        const scale = isBig ? 26 : 7.5; 
        const sparkType = isBig ? 'big_spark' : 'spark';

        for (let i = 0; i < particleCount; i++) {
            let t = Math.random() * Math.PI * 2;
            let vx, vy;

            if (shapeType === 0) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                vx = x * (scale / 10);
                vy = y * (scale / 10);
            } else if (shapeType === 1) {
                let r = Math.sin(5 * t) * 12;
                vx = r * Math.cos(t) * (scale / 6);
                vy = -r * Math.sin(t) * (scale / 6);
            } else {
                let speed = Math.random() * scale;
                vx = Math.cos(t) * speed;
                vy = Math.sin(t) * speed;
            }

            vx += (Math.random() - 0.5) * (isBig ? 4 : 0.8);
            vy += (Math.random() - 0.5) * (isBig ? 4 : 0.8);

            let color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new Particle(startX, startY, vx, vy, color, sparkType));
        }

        if (isBig) {
            ctx.fillStyle = 'rgba(255, 25
