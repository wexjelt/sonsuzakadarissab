<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #000000 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            user-select: none;
        }

        #intro-stage {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #fff;
            background: linear-gradient(45deg, #ff0055, #ff7eb3);
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .start-btn:active {
            transform: scale(0.95);
        }

        canvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .message {
            display: none;
            position: absolute;
            left: 50%;
            z-index: 10;
            width: 90%;
            line-height: 1.6;
        }

        #msg1 {
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #msg2 {
            top: 0;
            font-size: 14vw;
            font-weight: 800;
            letter-spacing: 5px;
            color: transparent;
            -webkit-text-stroke: 2px #ff0055;
            background: linear-gradient(45deg, #ff0055, #ff7eb3, #ff0055);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 25px rgba(255, 0, 85, 0.6), 0 0 60px rgba(255, 0, 85, 0.4);
            animation: grandDrizzle 8s cubic-bezier(0.1, 0.5, 0.3, 1) forwards;
        }

        #sandbox-hint {
            display: none;
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        @keyframes grandDrizzle {
            0% { transform: translate(-50%, 10vh) scale(0.7); opacity: 0; filter: blur(10px); }
            8% { opacity: 1; filter: blur(0px); }
            100% { transform: translate(-50%, 35vh) scale(1.05); opacity: 0.7; }
        }

        @media (min-width: 768px) {
            #msg1 { font-size: 2.5rem; width: 70%; }
            #msg2 { font-size: 8rem; }
        }
    </style>
</head>
<body>

    <div id="intro-stage">
        <button class="start-btn" id="startBtn">SÜRPRIZİ BAŞLAT</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="msg1" class="message">
        seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum
    </div>
    
    <div id="msg2" class="message">
        #İSSAB
    </div>

    <div id="sandbox-hint">Şimdi gökyüzü senin... Ekrana dokun!</div>

<script>
    // --- SES MOTORU ---
    let audioCtx = null;
    let musicInterval = null;

    function initAudio() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startAmbientMusic();
            }
        } catch (e) {
            console.log("Ses pas geçildi.");
        }
    }

    function playLaunchSound() {
        if (!audioCtx) return;
        try {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } catch(e){}
    }

    function playExplosionSound(isBig = false) {
        if (!audioCtx) return;
        try {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(isBig ? 90 : 130, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + (isBig ? 0.8 : 0.4));
            gain.gain.setValueAtTime(isBig ? 0.5 : 0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (isBig ? 0.8 : 0.4));
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + (isBig ? 0.8 : 0.4));
        } catch(e){}
    }

    function startAmbientMusic() {
        const notes = [196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
        function playNote() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                let randomNote = notes[Math.floor(Math.random() * notes.length)];
                osc.frequency.setValueAtTime(randomNote, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.3);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 2.7);
            } catch(e){}
        }
        function loop() {
            playNote();
            musicInterval = setTimeout(loop, [600, 1200, 1800][Math.floor(Math.random() * 3)]);
        }
        loop();
    }

    // --- TETİKLEME ---
    document.getElementById('startBtn').addEventListener('click', () => {
        initAudio();
        document.getElementById('intro-stage').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('intro-stage').style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            initStars();
            window.addEventListener('resize', resizeCanvas);
            startFireworksScenario();
        }, 500);
    });

    // --- GÖRSEL MOTOR ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let stars = [];
    let rocketInterval;
    let sandboxMode = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for(let i=0; i<60; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight * 0.7,
                size: Math.random() * 1.2,
                alpha: Math.random(),
                speed: Math.random() * 0.02 + 0.005
            });
        }
    }

    function drawStars() {
        ctx.save();
        for(let star of stars) {
            star.alpha += star.speed;
            if(star.alpha > 1 || star.alpha < 0.2) star.speed = -star.speed;
            ctx.globalAlpha = star.alpha;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    class Particle {
        constructor(x, y, vx, vy, color, type, targetY = 0) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.color = color;
            this.type = type;
            this.alpha = 1;
            this.targetY = targetY;
            this.decay = type === 'trail' ? 0.05 : (type === 'big_spark' ? 0.006 : 0.015);
            this.size = type === 'rocket' || type === 'big_rocket' ? 3.5 : (type === 'big_spark' ? 5 : 2.5);
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            if (this.type === 'spark' || this.type === 'big_spark') {
                this.vx *= 0.94; this.vy *= 0.94;
                this.vy += 0.05; this.alpha -= this.decay;
            } else if (this.type === 'trail') {
                this.vx *= 0.95; this.vy *= 0.95;
                this.alpha -= this.decay;
            } else {
                this.vy += 0.12;
                if (Math.random() > 0.3) {
                    particles.push(new Particle(this.x, this.y, (Math.random()-0.5)*0.5, 1, 'rgba(255,255,255,0.3)', 'trail'));
                }
            }
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.globalCompositeOperation = 'lighter'; 
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function explodeShape(startX, startY, shapeType, isBig = false) {
        const colors = ['#ff2a5f', '#ff7eb3', '#ff0055', '#fff', '#ffd700'];
        const particleCount = isBig ? 450 : 130; // Performans için sayıları optimize ettik
        const scale = isBig ? 22 : 8; 
        const sparkType = isBig ? 'big_spark' : 'spark';

        playExplosionSound(isBig);

        for (let i = 0; i < particleCount; i++) {
            let t = Math.random() * Math.PI * 2;
            let vx, vy;

            if (shapeType === 0) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                vx = x * (scale / 10); vy = y * (scale / 10);
            } else if (shapeType === 1) {
                let r = Math.sin(5 * t) * 12;
                vx = r * Math.cos(t) * (scale / 6); vy = -r * Math.sin(t) * (scale / 6);
            } else {
                let speed = Math.random() * scale;
                vx = Math.cos(t) * speed; vy = Math.sin(t) * speed;
            }

            let color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new Particle(startX, startY, vx + (Math.random()-0.5)*2, vy + (Math.random()-0.5)*2, color, sparkType));
        }

        if (isBig) {
            let msg2 = document.getElementById('msg2');
            msg2.style.display = 'block';

            setTimeout(() => {
                sandboxMode = true;
                let hint = document.getElementById('sandbox-hint');
                hint.style.display = 'block';
                setTimeout(() => { hint.style.opacity = '1'; }, 100);
            }, 4000);
        }
    }

    function launchRocket() {
        const x = Math.random() * (canvas.width * 0.7) + (canvas.width * 0.15);
        const vy = -(Math.random() * 3 + 11);
        playLaunchSound();
        particles.push(new Particle(x, canvas.height, 0, vy, '#fff', 'rocket'));
    }

    function launchBigRocket() {
        playLaunchSound();
        particles.push(new Particle(canvas.width / 2, canvas.height, 0, -16, '#ff0055', 'big_rocket'));
    }

    function animate() {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawStars();

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw();

            let isTriggered = false;
            if (p.type === 'rocket' && (p.targetY ? p.y <= p.targetY : p.vy >= -0.5)) {
                let shape = Math.random() > 0.5 ? 0 : 1; 
                explodeShape(p.x, p.y, shape, false);
                isTriggered = true;
            } else if (p.type === 'big_rocket' && p.vy >= -0.5) {
                explodeShape(p.x, p.y, 2, true);
                isTriggered = true;
            }

            if (isTriggered || p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }
        requestAnimationFrame(animate);
    }

    canvas.addEventListener('click', (e) => {
        if (!sandboxMode) return;
        triggerSandboxFirework(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', (e) => {
        if (!sandboxMode) return;
        triggerSandboxFirework(e.touches[0].clientX, e.touches[0].clientY);
    });

    function triggerSandboxFirework(targetX, targetY) {
        playLaunchSound();
        let distanceY = canvas.height - targetY;
        let vy = -Math.sqrt(2 * 0.12 * distanceY) * 0.9; 
        particles.push(new Particle(targetX, canvas.height, 0, vy, '#fff', 'rocket', targetY));
    }

    function startFireworksScenario() {
        animate();
        rocketInterval = setInterval(launchRocket, 1000);
        launchRocket(); 
        
        setTimeout(() => {
            let msg1 = document.getElementById('msg1');
            msg1.style.display = 'block';
            setTimeout(() => { msg1.style.opacity = '1'; }, 50);
        }, 3500);

        setTimeout(() => {
            let msg1 = document.getElementById('msg1');
            msg1.style.opacity = '0';
            clearInterval(rocketInterval);
            
            setTimeout(() => { msg1.style.display = 'none'; }, 2000);
            setTimeout(launchBigRocket, 1500);
        }, 11000);
    }
</script>
</body>
</html>
