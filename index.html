<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Her Şeyin Başladığı Gün...</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            background-color: #1a0f1a;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Durum Yönetimi: 1 = Giriş Ekranı, 2 = Çakmak/Fitil, 3 = Havai Fişekler
        let stage = 1; 
        let errorTimer = 0;

        // Oyun Elemanları
        let lighter = { x: 0, y: 0, w: 44, h: 64, ignited: false, isDragging: false };
        let fuse = { x: 0, y: 0, w: 8, h: 24, burning: false, progress: 100 };
        let fireworkBox = { x: 0, y: 0, w: 64, h: 80 };
        
        let particles = [];
        let rockets = [];
        let timeline = 0;
        let finalRocketLaunched = false;
        let textOpacity = 0;

        // Havai fişek yazı matrisi
        const textGrid = {
            '#': [[0,2],[1,2],[2,0],[2,1],[2,2],[2,3],[2,4],[3,2],[4,0],[4,1],[4,2],[4,3],[4,4],[5,2],[6,2]],
            'İ': [[0,2],[2,2],[3,2],[4,2],[5,2],[6,2]],
            'S': [[0,1],[0,2],[0,3],[1,0],[2,0],[3,1],[3,2],[4,3],[5,3],[6,0],[6,1],[6,2]],
            'A': [[0,2],[1,1],[1,3],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3],[3,4],[4,0],[4,4],[5,0],[5,4],[6,0],[6,4]],
            'B': [[0,0],[0,1],[0,2],[0,3],[1,0],[1,4],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3],[4,0],[4,4],[5,0],[5,4],[6,0],[6,1],[6,2],[6,3]]
        };
        const wordSequence = ["#", "İ", "S", "S", "A", "B"];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Elemanların pozisyonlarını ekrana göre güncelle (Stage 2 için)
            fireworkBox.x = canvas.width / 2 - fireworkBox.w / 2;
            fireworkBox.y = canvas.height * 0.5;
            
            fuse.x = canvas.width / 2 - fuse.w / 2;
            fuse.y = fireworkBox.y - fuse.h;

            if (!lighter.isDragging) {
                lighter.x = canvas.width / 2 - lighter.w / 2;
                lighter.y = canvas.height * 0.8;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- DOKUNMATİK VE TIKLAMA KONTROLLERİ ---
        function handleStart(clientX, clientY) {
            if (stage === 1) {
                // Giriş butonunun koordinat alanı algılaması
                let btnX = canvas.width / 2 - 100;
                let btnY = canvas.height / 2 + 20;
                if (clientX >= btnX && clientX <= btnX + 200 && clientY >= btnY && clientY <= btnY + 50) {
                    // Tarayıcıyı asla yormayan yerel girdi penceresi
                    let answer = prompt("Her şeyin başladığı gün? (Örn: 09.03.2026)");
                    if (answer) {
                        let clean = answer.trim().replace(/[^0-9]/g, '');
                        if (clean === "09032026" || clean === "932026") {
                            stage = 2;
                        } else {
                            errorTimer = 120; // 2 saniye hata mesajı göster
                        }
                    }
                }
            } else if (stage === 2) {
                // Çakmağa dokunma kontrolü
                if (clientX >= lighter.x && clientX <= lighter.x + lighter.w &&
                    clientY >= lighter.y && clientY <= lighter.y + lighter.h) {
                    lighter.isDragging = true;
                    lighter.ignited = true;
                }
            } else if (stage === 3 && timeline > 1100) {
                // Tekrar oynat butonu aktifse sayfayı yenile
                let rBtnX = canvas.width / 2 - 80;
                let rBtnY = canvas.height * 0.85;
                if (clientX >= rBtnX && clientX <= rBtnX + 160 && clientY >= rBtnY && clientY <= rBtnY + 44) {
                    location.reload();
                }
            }
        }

        function handleMove(clientX, clientY) {
            if (stage === 2 && lighter.isDragging) {
                lighter.x = clientX - lighter.w / 2;
                lighter.y = clientY - lighter.h / 2;

                // Çakmak ateşi fitile değdi mi kontrolü
                let flameX = lighter.x + lighter.w / 2;
                let flameY = lighter.y - 10;

                if (flameX >= fuse.x && flameX <= fuse.x + fuse.w &&
                    flameY >= fuse.y && flameY <= fuse.y + fuse.h && !fuse.burning) {
                    fuse.burning = true;
                    lighter.isDragging = false;
                }
            }
        }

        function handleEnd() {
            if (stage === 2) lighter.isDragging = false;
        }

        // Pointer Olayları (Hem Mouse hem Dokunmatik Ekranlar İçin Ortak)
        canvas.addEventListener('pointerdown', e => handleStart(e.clientX, e.clientY));
        canvas.addEventListener('pointermove', e => handleMove(e.clientX, e.clientY));
        canvas.addEventListener('pointerup', handleEnd);

        // --- PARÇACIK VE ROKET MOTORU ---
        class PixelParticle {
            constructor(x, y, vx, vy, color, size, fade, gravity = 0.07) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.color = color; this.size = size; this.fade = fade;
                this.gravity = gravity; this.alpha = 1;
            }
            update() {
                this.vx *= 0.94; this.vy *= 0.94; this.vy += this.gravity;
                this.x += this.vx; this.y += this.vy; this.alpha -= this.fade;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        class Rocket {
            constructor(startX, startY, targetY, isFinal = false) {
                this.x = startX; this.y = startY; this.targetY = targetY;
                this.isFinal = isFinal;
                this.vy = isFinal ? -4.5 : -Math.random() * 3 - 5;
                this.alive = true;
            }
            update() {
                this.y += this.vy;
                if (this.y <= this.targetY) {
                    this.alive = false;
                    if (this.isFinal) explodeFinalText(this.x, this.y);
                    else explodeStandard(this.x, this.y);
                }
                if (Math.random() < 0.3) {
                    particles.push(new PixelParticle(this.x, this.y, Math.random() * 1 - 0.5, 1, '#ffb3d9', 4, 0.05, 0.02));
                }
            }
            draw() {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x - 2, this.y, 4, 12);
            }
        }

        function explodeStandard(cx, cy) {
            const colors = ['#ff3388', '#ff66aa', '#ffb3d9', '#ff0055', '#ffffff'];
            const chosenColor = colors[Math.floor(Math.random() * colors.length)];
            if (Math.random() < 0.5) {
                for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
                    const r = 4.5;
                    const vx = r * 16 * Math.pow(Math.sin(angle), 3) * 0.12;
                    const vy = -r * (13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle)) * 0.12;
                    particles.push(new PixelParticle(cx, cy, vx, vy, chosenColor, 6, Math.random() * 0.01 + 0.006, 0.03));
                }
            } else {
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 1;
                    particles.push(new PixelParticle(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, chosenColor, 6, Math.random() * 0.02 + 0.01, 0.05));
                }
            }
        }

        function explodeFinalText(cx, cy) {
            const pixelSize = Math.max(4, Math.min(8, canvas.width / 60)); 
            const charWidth = 6 * pixelSize; 
            const spacing = 3 * pixelSize; 
            const totalWidth = (wordSequence.length * charWidth) + ((wordSequence.length - 1) * spacing);
            let startX = cx - (totalWidth / 2);

            wordSequence.forEach((char) => {
                const matrix = textGrid[char];
                if (matrix) {
                    matrix.forEach(([row, col]) => {
                        const px = startX + (col * pixelSize);
                        const py = cy + (row * pixelSize) - (3.5 * pixelSize);
                        const color = char === '#' ? '#ffb3d9' : '#ff0055';
                        particles.push(new PixelParticle(px, py, Math.random() * 0.04 - 0.02, Math.random() * 0.04 - 0.02, color, pixelSize, 0.0004, 0.001));
                    });
                }
                startX += charWidth + spacing;
            });
        }

        // --- ANA OYUN DÖNGÜSÜ (RENDER LOOP) ---
        function update() {
            // Tarayıcı arka plan temizliği
            ctx.fillStyle = '#1a0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (stage === 1) {
                // STAGE 1: Giriş ve Soru Ekranı Çizimi
                ctx.fillStyle = '#2b1625';
                ctx.strokeStyle = '#ff66aa';
                ctx.lineWidth = 6;
                let boxW = Math.min(340, canvas.width - 40);
                let boxX = canvas.width / 2 - boxW / 2;
                let boxY = canvas.height / 2 - 100;
                ctx.fillRect(boxX, boxY, boxW, 180);
                ctx.strokeRect(boxX, boxY, boxW, 180);

                ctx.font = "11px 'Press Start 2P'";
                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "center";
                ctx.fillText("Her şeyin başladığı gün?", canvas.width / 2, boxY + 50);

                // Giriş Yap Butonu
                let btnX = canvas.width / 2 - 100;
                let btnY = canvas.height / 2 + 20;
                ctx.fillStyle = "#ff55aa";
                ctx.fillRect(btnX, btnY, 200, 44);
                ctx.fillStyle = "#ffffff";
                ctx.fillText("GİRİŞ YAP", canvas.width / 2, btnY + 26);

                // Hata Mesajı
                if (errorTimer > 0) {
                    errorTimer--;
                    ctx.fillStyle = "#ff4444";
                    ctx.font = "9px 'Press Start 2P'";
                    ctx.fillText("Yanlış cevap sevgilim... ❤️", canvas.width / 2, btnY + 90);
                }

            } else if (stage === 2) {
                // STAGE 2: Çakmak ve Kutuyu Çiz
                ctx.font = "9px 'Press Start 2P'";
                ctx.fillStyle = "#ff99cc";
                ctx.textAlign = "center";
                if (!lighter.ignited) {
                    ctx.fillText("Çakmağa Dokun ve Yak!", canvas.width / 2, 50);
                } else if (!fuse.burning) {
                    ctx.fillText("Sürükle ve Üstteki Fitili Yak!", canvas.width / 2, 50);
                }

                // Havai Fişek Kutusu
                ctx.fillStyle = "#2b1625";
                ctx.strokeStyle = "#ff55aa";
                ctx.lineWidth = 4;
                ctx.fillRect(fireworkBox.x, fireworkBox.y, fireworkBox.w, fireworkBox.h);
                ctx.strokeRect(fireworkBox.x, fireworkBox.y, fireworkBox.w, fireworkBox.h);

                // Fitil
                ctx.fillStyle = "#444444";
                ctx.fillRect(fuse.x, fuse.y, fuse.w, fuse.h);

                if (fuse.burning) {
                    fuse.progress -= 1.2;
                    ctx.fillStyle = "#ffcc00";
                    ctx.fillRect(fuse.x, fuse.y + (fuse.h * (100 - fuse.progress)/100), fuse.w, fuse.h * (fuse.progress/100));
                    
                    if (fuse.progress <= 0) {
                        stage = 3;
                    }
                }

                // Çakmak
                if (!fuse.burning) {
                    ctx.fillStyle = "#ff55aa";
                    ctx.fillRect(lighter.x, lighter.y, lighter.w, lighter.h);
                    ctx.fillStyle = "#dddddd";
                    ctx.fillRect(lighter.x + 6, lighter.y - 12, 32, 12);

                    if (lighter.ignited) {
                        ctx.fillStyle = Math.random() < 0.5 ? "#ff3388" : "#ffcc00";
                        ctx.fillRect(lighter.x + 16, lighter.y - 26, 12, 14);
                    }
                }

            } else if (stage === 3) {
                // STAGE 3: Havai Fişek Gösterisi ve Romantik Mesaj
                timeline++;

                // Arka planı hafif karartarak iz bırakma efekti yarat
                ctx.fillStyle = 'rgba(26, 15, 26, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Rastgele küçük roketler fırlat
                if (timeline % 50 === 1 && timeline < 320) {
                    rockets.push(new Rocket(Math.random() * (canvas.width - 100) + 50, canvas.height, Math.random() * (canvas.height * 0.3) + canvas.height * 0.1));
                }

                // Romantik Yazı Efekti
                if (timeline > 140 && textOpacity < 1) textOpacity += 0.01;
                ctx.save();
                ctx.globalAlpha = textOpacity;
                ctx.font = "3.2rem 'Great Vibes', cursive";
                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "center";
                ctx.shadowColor = "#ff3388";
                ctx.shadowBlur = 15;
                ctx.fillText("Seni göğe baktığında gördüğün", canvas.width / 2, canvas.height * 0.38);
                ctx.fillText("ay ve yıldızlar kadar seviyorum...", canvas.width / 2, canvas.height * 0.48);
                ctx.restore();

                // Büyük Final Roketi
                if (timeline === 380 && !finalRocketLaunched) {
                    finalRocketLaunched = true;
                    rockets.push(new Rocket(canvas.width / 2, canvas.height, canvas.height * 0.25, true));
                }

                // Roketleri Güncelle
                rockets.forEach((r, i) => {
                    r.update(); r.draw();
                    if (!r.alive) rockets.splice(i, 1);
                });

                // Parçacıkları Güncelle
                particles.forEach((p, i) => {
                    p.update(); p.draw();
                    if (p.alpha <= 0) particles.splice(i, 1);
                });

                // Tekrar Oynat Butonu
                if (timeline > 1100) {
                    let rBtnX = canvas.width / 2 - 80;
                    let rBtnY = canvas.height * 0.85;
                    ctx.fillStyle = "#ff55aa";
                    ctx.fillRect(rBtnX, rBtnY, 160, 44);
                    ctx.font = "10px 'Press Start 2P'";
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.fillText("TEKRAR OYNAT", canvas.width / 2, rBtnY + 26);
                }
            }

            requestAnimationFrame(update);
        }

        // Animasyonu Başlat
        requestAnimationFrame(update);
    </script>
</body>
</html>
