<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #stage2 { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 1s; }
        canvas { position: absolute; top:0; left:0; }
        
        #msg1 { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 2rem; opacity: 0; transition: 2s; pointer-events: none; }
        
        #msg2 { 
            position: absolute; color: #fff; font-size: 8rem; font-weight: 900; 
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055; 
            display: none; pointer-events: none;
            /* Patlama merkezinden çıkış animasyonu */
            animation: burstOut 1.5s ease-out forwards;
        }

        @keyframes burstOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="stage2">
        <h1 style="cursor:pointer" onclick="ignite()">Ateşlemek için dokun</h1>
    </div>

    <canvas id="canvas"></canvas>
    <div id="msg1">Seni tüm yıldızlardan daha çok seviyorum</div>
    <div id="msg2">#İSSAB</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    const colors = [
        ['#FF5733', '#FFC300', '#FF33A8'], 
        ['#33FF57', '#33FFF5', '#8D33FF'],
        ['#FF8C33', '#F5FF33', '#FF3333'],
        ['#33A8FF', '#FFFFFF', '#A8FF33']
    ];

    function ignite() {
        document.getElementById('stage2').style.opacity = 0;
        setTimeout(() => document.getElementById('stage2').style.display = 'none', 1000);
        setInterval(createRocket, 600);
        setTimeout(() => document.getElementById('msg1').style.opacity = 1, 2000);
        setTimeout(() => {
            document.getElementById('msg1').style.opacity = 0;
            createFinalExplosion();
        }, 8000);
    }

    class Particle {
        constructor(x, y, color, speed, angle, gravity = 0.1) {
            this.x = x; this.y = y; this.color = color;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.alpha = 1; this.gravity = gravity;
        }
        update() {
            this.vx *= 0.95; this.vy *= 0.95;
            this.vy += this.gravity;
            this.x += this.vx; this.y += this.vy;
            this.alpha -= 0.015;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
        }
    }

    function createRocket() {
        let x = Math.random() * canvas.width;
        let y = canvas.height;
        let targetY = Math.random() * (canvas.height/2);
        let color = colors[Math.floor(Math.random()*colors.length)][0];
        
        let rocket = { x, y, targetY, color, vy: -10 };
        let animateRocket = () => {
            rocket.y += rocket.vy;
            ctx.fillStyle = rocket.color;
            ctx.beginPath(); ctx.arc(rocket.x, rocket.y, 3, 0, Math.PI*2); ctx.fill();
            if(rocket.y <= rocket.targetY) {
                explode(rocket.x, rocket.y, rocket.color);
            } else { requestAnimationFrame(animateRocket); }
        };
        animateRocket();
    }

    function explode(x, y, color) {
        for(let i=0; i<80; i++) {
            particles.push(new Particle(x, y, color, Math.random()*6, Math.random()*Math.PI*2));
        }
    }

    function createFinalExplosion() {
        let x = canvas.width/2, y = canvas.height/2;
        // Çok daha yoğun bir final
        for(let i=0; i<400; i++) {
            particles.push(new Particle(x, y, '#FFD700', Math.random()*12, Math.random()*Math.PI*2, 0.05));
        }
        let msg2 = document.getElementById('msg2');
        msg2.style.left = x + 'px';
        msg2.style.top = y + 'px';
        msg2.style.display = 'block';
    }

    function loop() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.update(); p.draw();
            if(p.alpha <= 0) particles.splice(i, 1);
        });
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
