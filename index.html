<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #000000 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            user-select: none;
        }

        #stage2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s;
        }

        .instruction {
            margin-top: 10vh;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: pulseText 2s infinite;
        }

        #lighter {
            position: absolute;
            top: 65%; left: 30%;
            width: 40px; height: 75px;
            background: linear-gradient(135deg, #e0e0e0 0%, #9e9e9e 50%, #616161 100%);
            border-radius: 8px;
            box-shadow: inset -2px -2px 6px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.6);
            cursor: grab;
            z-index: 25;
            transition: transform 0.1s;
        }
        #lighter:active { cursor: grabbing; transform: scale(0.95); }
        
        #lighter::before {
            content: ''; position: absolute;
            top: -15px; left: 0;
            width: 40px; height: 15px;
            background: linear-gradient(135deg, #bdbdbd 0%, #757575 100%);
            border-radius: 8px 8px 0 0;
            transform-origin: bottom left;
            transform: rotate(-45deg);
        }

        .flame {
            position: absolute;
            top: -35px; left: 10px;
            width: 20px; height: 35px;
            background: radial-gradient(circle at 50% 100%, #fff 0%, #ffeb3b 30%, #ff5722 70%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff5722, 0 0 40px #ffeb3b;
            animation: flicker 0.1s infinite alternate;
            pointer-events: none;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.1) rotate(2deg); opacity: 1; }
        }

        #firework-prop {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 30px; height: 100px;
            background: linear-gradient(to right, #b71c1c, #d32f2f, #b71c1c);
            border-radius: 3px 3px 0 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        #firework-prop::before {
            content: ''; position: absolute;
            top: -25px; left: -5px;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 25px solid #ff5252;
        }

        #fuse {
            position: absolute;
            bottom: 120px; left: 50%;
            width: 4px; height: 80px;
            background: #795548;
            border-radius: 2px;
            box-shadow: inset 1px 0 2px rgba(0,0,0,0.5);
        }

        canvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .message {
            display: none;
            position: absolute;
            left: 50%;
            z-index: 10;
            width: 90%;
            line-height: 1.6;
        }

        #msg1 {
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #msg2 {
            top: 0;
            font-size: 14vw;
            font-weight: 800;
            letter-spacing: 5px;
            color: transparent;
            -webkit-text-stroke: 2px #ff0055;
            background: linear-gradient(45deg, #ff0055, #ff7eb3, #ff0055);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 25px rgba(255, 0, 85, 0.6), 0 0 60px rgba(255, 0, 85, 0.4);
            animation: grandDrizzle 8s cubic-bezier(0.1, 0.5, 0.3, 1) forwards;
        }

        /* İnteraktif Mod (Sandbox) Yazısı */
        #sandbox-hint {
            display: none;
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes grandDrizzle {
            0% { transform: translate(-50%, 10vh) scale(0.7); opacity: 0; filter: blur(10px); }
            8% { opacity: 1; filter: blur(0px); }
            100% { transform: translate(-50%, 35vh) scale(1.05); opacity: 0.7; }
        }

        @media (min-width: 768px) {
            #msg1 { font-size: 2.5rem; width: 70%; }
            #msg2 { font-size: 8rem; }
        }
    </style>
</head>
<body>

    <div id="stage2">
        <div class="instruction">Ateşlemek için alevi fitile sürükle</div>
        <div id="fuse"></div>
        <div id="firework-prop"></div>
        
        <div id="lighter" onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
            <div class="flame" id="flame"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="msg1" class="message">
        seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum
    </div>
    
    <div id="msg2" class="message">
        #İSSAB
    </div>

    <div id="sandbox-hint">Şimdi gökyüzü senin... Ekrana dokun!</div>

<script>
    // --- SES MOTORU (WEB AUDIO API - CANLI SENTEZ) ---
    let audioCtx = null;
    let musicInterval = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startAmbientMusic();
        }
    }

    function playLaunchSound() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(80, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function playExplosionSound(isBig = false) {
        if (!audioCtx) return;
        // Derin Bas Gümlemesi
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(isBig ? 90 : 130, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + (isBig ? 0.8 : 0.4));
        gain.gain.setValueAtTime(isBig ? 0.6 : 0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (isBig ? 0.8 : 0.4));
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + (isBig ? 0.8 : 0.4));

        // Kıvılcım Çıtırtısı (Beyaz Gürültü)
        let bufferSize = audioCtx.sampleRate * (isBig ? 0.6 : 0.3);
        let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        let noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        let filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + (isBig ? 0.5 : 0.3));
        let noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(isBig ? 0.25 : 0.12, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (isBig ? 0.6 : 0.3));
        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
        noise.start();
    }

    function startAmbientMusic() {
        // Romantik & Duygusal Piyano Akor Dizilimi (Pentatonik / Rahatlatıcı)
        const notes = [196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // G3, A3, C4, D4, E4, G4, A4, C5
        function playNote() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            let randomNote = notes[Math.floor(Math.random() * notes.length)];
            osc.frequency.setValueAtTime(randomNote, audioCtx.currentTime);
            osc.detune.setValueAtTime(Math.random() * 8 - 4, audioCtx.currentTime); // Sıcaklık hissi

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.07, audioCtx.currentTime + 0.3); // Yumuşak dokunuş
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.8);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 3.0);
        }
        
        // Dinamik zamanlamalı piyano döngüsü
        function loop() {
            playNote();
            let delays = [500, 1000, 1500];
            musicInterval = setTimeout(loop, delays[Math.floor(Math.random() * delays.length)]);
        }
        loop();
    }


    // --- ÇAKMAK ETKİLEŞİMİ ---
    const lighter = document.getElementById('lighter');
    const fuse = document.getElementById('fuse');
    let isDragging = false;

    function startDrag(e) { isDragging = true; initAudio(); }

    document.addEventListener('mousemove', drag);
    document.addEventListener('touchmove', drag, {passive: false});
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    function drag(e) {
        if (!isDragging) return;
        if(e.type === 'touchmove') e.preventDefault(); 
        
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);
        
        lighter.style.left = (x - 20) + 'px';
        lighter.style.top = (y - 35) + 'px';

        let fuseRect = fuse.getBoundingClientRect();
        let flameRect = document.getElementById('flame').getBoundingClientRect();
        
        if (flameRect.right > fuseRect.left && flameRect.left < fuseRect.right &&
            flameRect.bottom > fuseRect.top && flameRect.top < fuseRect.bottom) {
            isDragging = false;
            ignite();
        }
    }
    function stopDrag() { isDragging = false; }


    // --- GÖRSEL MOTOR (YILDIZLAR, KUYRUKLAR VE HAVAİ FİŞEKLER) ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let stars = [];
    let rocketInterval;
    let sandboxMode = false;
    
    function ignite() {
        document.getElementById('stage2').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('stage2').style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            initStars(); // Gökyüzü yıldızlarını oluştur
            window.addEventListener('resize', resizeCanvas);
            startFireworksScenario();
        }, 500);
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for(let i=0; i<80; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight * 0.7,
                size: Math.random() * 1.5,
                alpha: Math.random(),
                speed: Math.random() * 0.02 + 0.005
            });
        }
    }

    function drawStars() {
        ctx.save();
        for(let star of stars) {
            // Yıldızların hafifçe göz kırpması (Twinkle efekti)
            star.alpha += star.speed;
            if(star.alpha > 1 || star.alpha < 0.2) star.speed = -star.speed;
            ctx.globalAlpha = star.alpha;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    class Particle {
        constructor(x, y, vx, vy, color, type, targetY = 0) {
            this.x = x; this.y = y;
            this.vx = vx; this.vy = vy;
            this.color = color;
            this.type = type; // rocket, big_rocket, spark, big_spark, trail
            this.alpha = 1;
            this.targetY = targetY; // Sandbox modu hedef patlama noktası
            
            if (type === 'big_spark') {
                this.decay = Math.random() * 0.003 + 0.004; // Ağır süzülme süresi
                this.size = Math.random() * 5.5 + 3.5;
            } else if (type === 'trail') {
                this.decay = Math.random() * 0.05 + 0.03;
                this.size = Math.random() * 2 + 1;
            } else {
                this.decay = Math.random() * 0.012 + 0.012;
                this.size = type === 'rocket' || type === 'big_rocket' ? 4 : (Math.random() * 4 + 2.5);
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            if (this.type === 'spark') {
                this.vx *= 0.93; this.vy *= 0.93;
                this.vy += 0.04; this.alpha -= this.decay;
            } else if (this.type === 'big_spark') {
                this.vx *= 0.96; this.vy *= 0.96;
                this.vy += 0.012; // Ağır dökülme yerçekimi
                this.alpha -= this.decay;
            } else if (this.type === 'trail') {
                this.vx *= 0.95; this.vy *= 0.95;
                this.alpha -= this.decay;
            } else {
                // Roket yükselişi
                this.vy += 0.15;
                // Roketlerin arkasında duman/kuyruk izi bırak (Smoke Trail)
                if (Math.random() > 0.2) {
                    particles.push(new Particle(this.x, this.y, (Math.random()-0.5)*1, (Math.random()*2), 'rgba(255,255,255,0.4)', 'trail'));
                }
            }
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.globalCompositeOperation = 'lighter'; 
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function explodeShape(startX, startY, shapeType, isBig = false) {
        // Renklere muazzam kontrast katan Altın Sarısı (#ffd700) ve Şampanya rengi (#fcf4a3) eklendi!
        const colors = ['#ff2a5f', '#ff7eb3', '#ff0055', '#ff99aa', '#fff', '#ffd700', '#fcf4a3'];
        const particleCount = isBig ? 700 : 200; 
        const scale = isBig ? 26 : 8.5; 
        const sparkType = isBig ? 'big_spark' : 'spark';

        playExplosionSound(isBig);

        for (let i = 0; i < particleCount; i++) {
            let t = Math.random() * Math.PI * 2;
            let vx, vy;

            if (shapeType === 0) { // Kalp
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                vx = x * (scale / 10); vy = y * (scale / 10);
            } else if (shapeType === 1) { // Gül
                let r = Math.sin(5 * t) * 12;
                vx = r * Math.cos(t) * (scale / 6); vy = -r * Math.sin(t) * (scale / 6);
            } else { // Devasa Final Dairesi
                let speed = Math.random() * scale;
                vx = Math.cos(t) * speed; vy = Math.sin(t) * speed;
            }

            vx += (Math.random() - 0.5) * (isBig ? 4 : 0.8);
            vy += (Math.random() - 0.5) * (isBig ? 4 : 0.8);

            let color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new Particle(startX, startY, vx, vy, color, sparkType));
        }

        if (isBig) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let msg2 = document.getElementById('msg2');
            msg2.style.display = 'block';

            // Final bittikten sonra sandbox modunu aktif et
            setTimeout(() => {
                sandboxMode = true;
                let hint = document.getElementById('sandbox-hint');
                hint.style.display = 'block';
                setTimeout(() => { hint.style.opacity = '1'; }, 100);
            }, 5000);
        }
    }

    function launchRocket() {
        const x = Math.random() * (canvas.width * 0.7) + (canvas.width * 0.15);
        const vy = -(Math.random() * 4 + 11);
        playLaunchSound();
        particles.push(new Particle(x, canvas.height, 0, vy, '#fff', 'rocket'));
    }

    function launchBigRocket() {
        playLaunchSound();
        particles.push(new Particle(canvas.width / 2, canvas.height, 0, -17, '#ff0055', 'big_rocket'));
    }

    function animate() {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawStars(); // Yıldızları arka plana çiz

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw();

            // Zirve noktası kontrolü (Sandbox veya normal moda göre)
            let isTriggered = false;
            if (p.type === 'rocket' && (p.targetY ? p.y <= p.targetY : p.vy >= -0.5)) {
                let shape = Math.random() > 0.5 ? 0 : 1; 
                explodeShape(p.x, p.y, shape, false);
                isTriggered = true;
            } else if (p.type === 'big_rocket' && p.vy >= -0.5) {
                explodeShape(p.x, p.y, 2, true);
                isTriggered = true;
            }

            if (isTriggered || p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }
        requestAnimationFrame(animate);
    }

    // --- INTERAKTIF SANDBOX TIKLAMA OLAYI ---
    canvas.addEventListener('click', (e) => {
        if (!sandboxMode) return;
        triggerSandboxFirework(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', (e) => {
        if (!sandboxMode) return;
        triggerSandboxFirework(e.touches[0].clientX, e.touches[0].clientY);
    });

    function triggerSandboxFirework(targetX, targetY) {
        // Tıklanan yere doğru aşağıdan yukarı fırlayan roket hesaplaması
        playLaunchSound();
        // Gerekli ilk dikey hızı hesapla (fiziksel hedefleme)
        let distanceY = canvas.height - targetY;
        let vy = -Math.sqrt(2 * 0.15 * distanceY) * 0.9; 
        particles.push(new Particle(targetX, canvas.height, 0, vy, '#fff', 'rocket', targetY))
