<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonsuz Bir Hikaye...</title>
    <style>
        body { background: #110b11; color: white; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 4px solid #ff007f; padding: 20px; text-align: center; width: 80%; max-width: 300px; }
        input { width: 90%; padding: 10px; background: black; border: 2px solid #ff007f; color: white; text-align: center; margin-bottom: 10px; font-size: 16px; }
        button { background: #ff007f; color: white; border: none; padding: 10px 20px; font-weight: bold; width: 100%; }
        #error { color: red; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <p>Beraber gitmek istediğimiz ülke?<br>(Baş harfi S)</p>
    <form id="loginForm">
        <input type="text" id="cevap" placeholder="Cevabı yaz..." required autocomplete="off">
        <button type="submit">GİRİŞ YAP</button>
    </form>
    <div id="error">Yanlış cevap, tekrar dene...</div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const input = document.getElementById('cevap');
    const error = document.getElementById('error');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const val = input.value.toLowerCase().replace(/ı/g, 'i').replace(/ş/g, 's').replace(/ç/g, 'c');
        
        if (val === "isvicre" || val === "isviçre") {
            alert("Doğru! Yönlendiriliyorsun...");
            // Buraya oyunun olduğu kısmı tetikleyen kodu ekleyebilirsin
            window.location.href = "oyun_sayfan.html"; // Ya da gizli div'i göster
        } else {
            error.style.display = "block";
            input.value = "";
        }
    });
</script>
</body>
</html>
