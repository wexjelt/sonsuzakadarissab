<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Press Start 2P', monospace; /* 8-bit retro font */
            text-align: center;
            user-select: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .message {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-shadow: 3px 3px 0px #000;
            width: 90%;
            line-height: 1.8;
        }

        #msg1 {
            font-size: 16px;
            color: #fff;
        }

        #msg2 {
            font-size: 8vw; /* Ekrana göre devasa boyut */
            color: #ff0055;
            font-weight: bold;
        }

        /* Mobilde uzun yazının daha iyi durması için */
        @media (min-width: 768px) {
            #msg1 { font-size: 24px; width: 70%; }
            #msg2 { font-size: 60px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="msg1" class="message">
        seni göğe baktığında ki ay ve tüm yıldızlardan daha çok seviyorum
    </div>
    <div id="msg2" class="message">
        #İSSAB
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
        constructor(x, y, vx, vy, color, type, lifeMultiplier = 1) {
            this.x = x; 
            this.y = y;
            this.vx = vx; 
            this.vy = vy;
            this.color = color;
            this.type = type; // 'rocket', 'big_rocket', 'spark'
            this.life = 100 * lifeMultiplier;
            this.maxLife = this.life;
            this.size = (Math.random() * 4 + 4); // Minecraft tarzı piksel blokları
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            // Kıvılcımlar için yerçekimi ve sürtünme
            if (this.type === 'spark') {
                this.vy += 0.03; // Hafif yerçekimi
                this.life -= 1.5;
            } else if (this.type === 'big_spark') {
                this.vy += 0.05;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= 1;
            }
        }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size); // Kare çizimi (Pixel art)
            ctx.globalAlpha = 1;
        }
    }

    // Kalp şeklini çizen matematiksel algoritma
    function explodeHeart(startX, startY, isBig = false) {
        const colors = ['#ff0033', '#ff3366', '#ff0055', '#ff99aa', '#ffffff'];
        const scale = isBig ? 0.6 : 0.25; // Havai fişeğin büyüklüğü
        const step = isBig ? 0.05 : 0.1;
        const sparkType = isBig ? 'big_spark' : 'spark';
        const lifeMult = isBig ? 2 : 1;

        for (let t = 0; t < Math.PI * 2; t += step) {
            // Kalp denklemi
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            let vx = x * scale;
            let vy = y * scale;
            
            let color = colors[Math.floor(Math.random() * colors.length)];
            
            // Kalbin ana hatları
            particles.push(new Particle(startX, startY, vx, vy, color, sparkType, lifeMult));
            
            // Kalbin içinin biraz dolu görünmesi için rastgele iç kıvılcımlar
            if(Math.random() > 0.5) {
                particles.push(new Particle(startX, startY, vx * 0.8, vy * 0.8, color, sparkType, lifeMult));
            }
        }
        
        // Final patlamasıysa ekranı sars ve mesajı göster
        if (isBig) {
            setTimeout(() => {
                let msg2 = document.getElementById('msg2');
                msg2.style.display = 'block';
            }, 500);
        }
    }

    // Normal roket fırlatma
    function launchRocket() {
        const x = Math.random() * (canvas.width * 0.8) + (canvas.width * 0.1);
        const vy = -(Math.random() * 4 + 8);
        particles.push(new Particle(x, canvas.height, 0, vy, '#fff', 'rocket'));
    }

    // Devasa final roketi
    function launchBigRocket() {
        particles.push(new Particle(canvas.width / 2, canvas.height, 0, -14, '#ff0055', 'big_rocket'));
    }

    // Animasyon Döngüsü
    function animate() {
        // Arkada hafif iz bırakan siyah ekran (Gökyüzü)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.update();
            p.draw();

            // Roket tepe noktasına ulaştıysa patlat
            if (p.type === 'rocket' && p.vy >= -1) {
                explodeHeart(p.x, p.y, false);
                particles.splice(i, 1);
                continue;
            } else if (p.type === 'big_rocket' && p.vy >= -1) {
                explodeHeart(p.x, p.y, true);
                particles.splice(i, 1);
                continue;
            }

            // Ömrü bitenleri sil
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }
        requestAnimationFrame(animate);
    }

    // === SENARYO YÖNETİMİ ===
    
    // 1. Ekrana sürekli kalp havai fişekleri at
    let rocketInterval = setInterval(launchRocket, 800);
    
    // İlk roketi anında at
    launchRocket();
    
    // Animasyonu başlat
    animate();

    // 2. 4 Saniye sonra uzun mesajı göster
    setTimeout(() => {
        document.getElementById('msg1').style.display = 'block';
    }, 4000);

    // 3. 11 Saniye sonra (mesaj okunduktan sonra) mesajı gizle ve normal havai fişekleri durdur
    setTimeout(() => {
        document.getElementById('msg1').style.display = 'none';
        clearInterval(rocketInterval); // Yeni küçük fişek atma
        
        // 4. Hemen ardından devasa havai fişeği fırlat
        setTimeout(launchBigRocket, 1000);
    }, 11000);

</script>
</body>
</html>
